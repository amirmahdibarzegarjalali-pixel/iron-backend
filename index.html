  '</div>';

  html+='<div class="panel section-gap" style="padding:14px;">'+
    '<div class="row" style="justify-content:space-between;margin-bottom:8px;"><span class="row" style="gap:6px;"><span>🤖</span><span style="font-weight:800;font-size:14px;">مربی هوشمند آیرون</span></span>'+
    (state.authUser?'<span style="font-size:9px;color:var(--green2);border:1px solid rgba(61,220,116,.4);padding:2px 6px;border-radius:8px;">آنلاین · Gemini</span>':'<span style="font-size:9px;color:var(--muted);">حالت پایه</span>')+
    '</div>'+
    '<div id="chatLog" class="scroll" style="margin-bottom:10px;">';
  if(state.chat.length===0){
    html+='<div style="font-size:12px;color:var(--muted);">بپرس هر چی می‌خوای — به همه‌ی داده‌هات (برنامه، تغذیه، آمار، رکوردها) دسترسی دارم. مثلاً:\n\n• «برنامه‌ی امروزم چیه؟»\n• «پیشرفتم چطوره؟»\n• «یه برنامه سینه و پا برام بساز» 🆕\n• «تغذیه‌م چیه؟» یا «رکوردهام چی هستن؟»</div>';
  } else {
    state.chat.forEach(function(m){
      const isUser=m.role==="user";
      let photoHtml = m.photo ? '<img src="'+m.photo+'" style="max-width:180px;width:100%;border-radius:8px;margin-bottom:6px;display:block;" />' : '';
      let bubble='<div style="max-width:88%;margin-'+(isUser?'right':'left')+':auto;margin-'+(isUser?'left':'right')+':0;background:'+(isUser?'rgba(216,174,82,0.1)':'rgba(61,220,116,0.06)')+';border:1px solid '+(isUser?'rgba(216,174,82,.35)':'var(--border)')+';border-radius:8px;padding:8px 12px;font-size:13px;margin-top:6px;white-space:pre-wrap;line-height:1.6;">'+photoHtml+esc(m.text)+'</div>';
      
      // اگه پیام شامل برنامه‌ی پیشنهادیه، کارت رو رندر کن
      if(!isUser && m.program){
        if(m.program.progId===state.pendingAiProgramId && !m.applied && !m.appliedToday){ state.pendingAiProgram=m.program; }
        bubble+=chatProgramCard(m);
      }
      html+=bubble;
    });
  }
  if(state.chatTyping){
    html+='<div style="max-width:60%;margin-left:auto;margin-right:0;background:rgba(61,220,116,0.06);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;margin-top:6px;color:var(--muted);">مربی داره فکر می‌کنه... <span class="pulse">💭</span></div>';
  }
  html+='</div>';
  // نمایش عکس در حال انتظار
  if(state.chatPhoto){
    html+='<div style="margin:0 0 8px;display:flex;align-items:center;gap:8px;background:rgba(216,174,82,.08);border:1px solid rgba(216,174,82,.3);border-radius:8px;padding:6px;">'+
      '<img src="'+state.chatPhoto+'" style="width:48px;height:48px;border-radius:6px;object-fit:cover;" />'+
      '<span style="font-size:12px;color:var(--brass2);">عکس آماده ارسال</span>'+
      '<button data-action="clear-chat-photo" style="margin-right:auto;color:var(--ink2);font-size:16px;">✕</button></div>';
  }
  // دکمه‌های مدیریت چت (جستجو/پاکسازی)
  if(state.chat.length>0){
    html+='<div class="row" style="margin-bottom:6px;gap:6px;">'+
      '<input id="chatSearchInput" class="stat-input-full" style="flex:1;width:auto;font-size:12px;padding:6px 10px;" placeholder="🔍 جستجو در گفتگوها..." value="'+esc(state.chatSearch)+'" />'+
      '<button data-action="clear-chat" style="font-size:11px;color:var(--ink2);border:1px solid rgba(255,82,82,.3);border-radius:6px;padding:6px 8px;" title="پاک کردن همه">🗑</button>'+
      '<button data-action="del-last-chat" style="font-size:11px;color:var(--brass);border:1px solid rgba(216,174,82,.3);border-radius:6px;padding:6px 8px;" title="حذف آخرین">↩</button>'+
    '</div>';
  }
  html+='<div class="row"><button class="plusbtn"<button class="plusbtn" data-action="pick-chat-photo" style="background:rgba(216,174,82,.15);color:var(--brass);font-size:18px;border:1px solid rgba(216,174,82,.4);" '+(state.chatTyping?"disabled":"")+' title="ارسال عکس">📷</button><input id="chatInput" class="stat-input-full" style="flex:1;width:auto;" placeholder="سوالت رو بنویس..." '+(state.chatTyping?"disabled":"")+' /><button class="plusbtn" data-action="chat-send" style="background:var(--green2);" '+(state.chatTyping?"disabled":"")+'>➤</button></div></div>';

  html+='<div class="panel section-gap" style="padding:16px;">'+
    '<div style="font-weight:700;font-size:14px;margin-bottom:8px;">📄 خروجی PDF برنامه</div>'+
    '<div style="font-size:11px;color:var(--muted);margin-bottom:10px;">برنامه‌ی تمرین کاملت رو به‌صورت یه فایل PDF زیبا دانلود کن؛ مناسب برای چاپ، ذخیره یا فرستادن برای مربی.</div>'+
    '<div class="chipgrid3" style="margin-bottom:8px;">'+
      '<button class="chip '+(state.pdfExportType==="main"?"sel":"")+'" data-action="set-pdf-type" data-val="main">اصلی</button>'+
      '<button class="chip '+(state.pdfExportType==="quick"?"sel":"")+'" data-action="set-pdf-type" data-val="quick">سریع</button>'+
      '<button class="chip '+(state.pdfExportType==="home"?"sel":"")+'" data-action="set-pdf-type" data-val="home">خانگی</button>'+
    '</div>'+
    '<button class="btn-full" data-action="export-pdf">📄 دانلود برنامه به صورت PDF</button>'+
  '</div>';

  html+='<div class="panel section-gap" style="padding:16px;">'+
    '<div style="font-weight:700;font-size:14px;margin-bottom:8px;">💾 پشتیبان‌گیری</div>'+
    '<div style="font-size:11px;color:var(--muted);margin-bottom:10px;">اطلاعاتت روی همین گوشی ذخیره‌ست. یه فایل پشتیبان بگیر تا اگه گوشی/مرورگر عوض شد، از دستش ندی.</div>'+
    '<button class="btn-full" data-action="export-backup">⬇️ دانلود پشتیبان</button>'+
    '<button class="btn-full btn-brass" style="margin-top:8px;" data-action="import-backup">⬆️ بازگردانی از فایل</button>'+
  '</div>';

  html+='<div style="text-align:center;padding-top:10px;">'+
    '<button data-action="reset" style="font-size:12px;text-decoration:underline;color:'+(state.confirmReset?'var(--ink2)':'var(--muted)')+';">'+
      (state.confirmReset?"مطمئنی؟ دوباره بزن برای پاک کردن همه‌چیز":"ریست کامل اطلاعات")+
    '</button>'+
  '</div>';
  return html;
}

/* ================= مربیان (Coach System) ================= */
function renderCoaches(){
  var html="";
  try{
    var cp=state.coachProfile;
    
    // === مربی تایید شده ===
    if(cp&&cp.status==="approved"){
      var r=cp.ranking||{};
      var sub=cp.subscription||"none";
      html+="<div class='panel' style='padding:14px;text-align:center;border-color:rgba(61,220,116,.3);'>"+
        "<div style='font-weight:800;font-size:15px;'>"+esc(cp.name||"مربی")+(cp.verified?" <span style='color:var(--green2);font-size:11px;'>\u2705</span>":"")+"</div>"+
        "<div style='font-size:11px;color:var(--muted);margin-top:2px;'>"+esc(cp.specialty||"")+" \u00b7 "+esc(cp.city||"")+"</div>"+
        "<div style='font-size:12px;color:var(--brass2);margin-top:4px;font-weight:700;'>"+esc(r.rank||"Bronze")+" \u00b7 \u2b50 "+toFa(r.avgRating||0)+" \u00b7 "+toFa(r.totalStudents||0)+" شاگرد</div>"+
        (sub&&sub!=="none"?"<div style='font-size:11px;color:var(--green2);margin-top:4px;'>\u2705 اشتراک: "+esc(sub)+"</div>":"")+
      "</div>";
      if(!sub||sub==="none"){
        html+="<div class='panel section-gap' style='padding:12px;border-color:rgba(255,82,82,.2);'>"+
          "<div style='font-size:12px;color:var(--ink2);font-weight:700;'>\u26a0\ufe0f اشتراک فعال نداری</div>"+
          "<div style='font-size:11px;color:var(--muted);margin-top:2px;'>برای ساخت و فروش برنامه باید اشتراک تهیه کنی.</div>"+
          "<button class='btn-full btn-brass' style='margin-top:6px;' data-action='coach-sub' data-view='plans'>\U0001f4cb خرید اشتراک</button>"+
        "</div>";
      }
      html+="<div class='panel section-gap' style='padding:12px;'>"+
        "<div style='font-weight:800;font-size:14px;margin-bottom:8px;'>\U0001f6e0\ufe0f ابزارهای مربی</div>"+
        "<button class='btn-outline' data-action='coach-sub' data-view='analytics'>\U0001f4ca آمار و درآمد</button>"+
        "<button class='btn-outline' data-action='coach-sub' data-view='wallet'>\U0001f4b0 کیف پول</button>"+
        "<button class='btn-outline' data-action='coach-sub' data-view='mine'>\U0001f4dd برنامه‌های من</button>"+
        "<button class='btn-full btn-purple' data-action='coach-sub' data-view='new'>\u2795 ساخت برنامه جدید</button>"+
      "</div>";
      // زیر-صفحه‌ها
      if(state.coachSub==="plans")html+=_renderCoachPlans();
      else if(state.coachSub==="analytics")html+=_renderCoachAnalytics();
      else if(state.coachSub==="wallet")html+=_renderCoachWallet();
      else if(state.coachSub==="mine")html+=_renderCoachMine();
      else if(state.coachSub==="new")html+=_renderCoachNew();
    }
    // === در انتظار ===
    else if(cp&&cp.status==="pending"){
      html+="<div class='panel' style='padding:16px;text-align:center;'>"+
        "<div style='font-size:28px;'>\u23f3</div>"+
        "<div style='font-weight:800;font-size:14px;margin-top:4px;'>درخواست شما در حال بررسی است</div>"+
        "<div style='font-size:12px;color:var(--muted);margin-top:4px;'>مدیر به‌زودی درخواست شما رو تایید می‌کنه.</div>"+
      "</div>";
    }
    // === رد شده ===
    else if(cp&&cp.status==="rejected"){
      html+="<div class='panel' style='padding:16px;text-align:center;border-color:rgba(255,82,82,.3);'>"+
        "<div style='font-size:28px;'>\u274c</div>"+
        "<div style='font-weight:800;font-size:14px;color:var(--ink2);margin-top:4px;'>درخواست رد شد</div>"+
        "<button class='btn-outline' style='margin-top:8px;' data-action='coach-become'>\U0001f4dd درخواست مجدد</button>"+
      "</div>";
    }
    
    // === تبدیل به مربی (اگه مربی نیست) ===
    if(!cp){
      html+="<div class='panel' style='padding:16px;text-align:center;border-color:rgba(216,174,82,.3);'>"+
        "<div style='font-size:32px;'>\U0001f3c6</div>"+
        "<div style='font-weight:800;font-size:15px;margin:4px 0;'>مربی ورزشی شو</div>"+
        "<div style='font-size:12px;color:var(--muted);margin-bottom:10px;'>پروفایل بساز، شاگرد بگیر و برنامه بفروش.</div>"+
        "<button class='btn-full btn-brass' data-action='coach-become'>\U0001f4dd ثبت درخواست مربی</button>"+
      "</div>";
    }
    
    // === جستجو ===
    html+="<div class='panel section-gap' style='padding:12px;'>"+
      "<div style='font-weight:700;font-size:13px;margin-bottom:8px;'>\U0001f50d جستجوی مربی</div>"+
      "<input class='stat-input-full' id='coachSearchInput' placeholder='تخصص یا شهر...' style='margin-bottom:6px;'>"+
      "<button class='btn-full' data-action='coach-search-btn'>جستجو</button>";
    if(state.coachSearchResults!==null){
      if(state.coachSearchResults.length===0){
        html+="<div style='text-align:center;color:var(--muted);font-size:12px;padding:8px;'>مربی پیدا نشد</div>";
      } else {
        state.coachSearchResults.forEach(function(coach){
          var rr=coach.ranking||{};
          html+="<div style='padding:8px 0;border-bottom:1px solid var(--border);' data-action='coach-view' data-id='"+coach.id+"'>"+
            "<div style='font-size:13px;font-weight:700;'>"+esc(coach.name||"مربی")+(coach.verified?" \u2705":"")+"</div>"+
            "<div style='font-size:11px;color:var(--muted);'>"+esc(coach.specialty||"")+" \u00b7 "+esc(coach.city||"")+" \u00b7 \u2b50"+toFa(rr.avgRating||0)+"</div>"+
          "</div>";
        });
      }
    }
    html+="</div>";
    
  }catch(e){
    html="<div class='panel' style='padding:16px;color:var(--ink2);'>خطا در بارگذاری: "+esc(e.message)+"</div>";
  }
  return html;
}

// === زیر-صفحه‌ها ===
function _renderCoachPlans(){
  var h="<div class='panel section-gap' style='padding:12px;'>";
  if(state._coachPlans){
    state._coachPlans.forEach(function(p){
      h+="<div style='padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;'>"+
        "<div style='font-weight:700;font-size:13px;'>"+esc(p.name)+"</div>"+
        "<div style='font-size:10px;color:var(--muted);'>"+toFa(p.durationDays)+" روز</div>"+
        "<div style='font-size:10px;margin-top:4px;line-height:1.5;'>"+p.features.map(function(f){return "\u2705 "+esc(f);}).join("<br>")+"</div>"+
        "<div style='display:flex;justify-content:space-between;margin-top:6px;'>"+
        "<span style='font-weight:700;color:var(--brass2);'>"+toFa(p.priceToman)+" ت</span>"+
        "<button class='btn-full btn-brass' style='width:auto;margin:0;padding:4px 12px;font-size:11px;' data-action='coach-buy-plan' data-plan='"+p.id+"'>خرید</button></div></div>";

  return h+"</div>";

    "<div class='hist-row'><span>رتبه</span><span style='color:var(--brass2);font-weight:700;'>"+esc(r.rank||"-")+"</span></div>"+

}

  // Coach System
  else if(action==="coach-become"){
    if(!state.authUser){alert("برای ثبت درخواست مربی باید وارد حساب بشی.");return;}
    state.coachView="become";state.coachSub=null;render();
  }
  else if(action==="coach-back-main"){state.coachView=null;state.coachSub=null;render();}
  else if(action==="coach-sub"){
    var v=t.dataset.view;state.coachSub=v;render();
    if(v==="plans"){state._coachPlans=null;render();api.coachPlans().then(function(r){state._coachPlans=r;render();}).catch(function(e){state._coachPlans=[];render();});}
    else if(v==="analytics"){state._coachAnalytics=null;render();api.coachAnalytics().then(function(r){state._coachAnalytics=r;render();}).catch(function(e){state._coachAnalytics={ranking:{},wallet:{},students:0,programs:{}};render();});}
    else if(v==="wallet"){state._coachWallet=null;render();api.coachWallet().then(function(r){state._coachWallet=r;render();}).catch(function(e){state._coachWallet={balance:0,totalEarnings:0,totalCommission:0,transactions:[]};render();});}
    else if(v==="mine"){state._coachPrograms=null;render();api.coachPrograms().then(function(r){state._coachPrograms=r;render();}).catch(function(e){state._coachPrograms=[];render();});}
  }
  else if(action==="coach-submit-btn"){
    if(!state.authUser){alert("اول وارد حساب شو");return;}
    var sp=document.getElementById("cbSpecialty").value.trim();
    var ci=document.getElementById("cbCity").value.trim();
    var bi=document.getElementById("cbBio").value.trim();
    if(!sp||!ci||!bi){alert("تخصص، شهر و درباره الزامی است");return;}
    api.coachRequest({
      name:document.getElementById("cbName").value.trim(),specialty:sp,city:ci,bio:bi,
      experience:Number(document.getElementById("cbExp").value)||0,
      pricePerSession:Number(document.getElementById("cbPrice").value)||0,onlineSessions:true
    }).then(function(r){state.coachView=null;state.coachProfile=r;state._coachProfileStatus="done";alert("ثبت شد! در انتظار تایید مدیر.");render();})
    .catch(function(e){if(e.status===401){alert("نشست منقضی شده. دوباره وارد شو.");state.forceAuthScreen=true;state.authScreen="login";render();}else{alert(e.message);}});
  }
  else if(action==="coach-search-btn"){
    var si=document.getElementById("coachSearchInput");
    state.coachSearchResults=null;render();
    api.coachList(si&&si.value.trim()?("specialty="+encodeURIComponent(si.value.trim())):"")
    .then(function(r){state.coachSearchResults=r;render();})
    .catch(function(e){state.coachSearchResults=[];render();});
  }
  else if(action==="coach-view"){
    api.coachGet(t.dataset.id).then(function(r){state.coachView=r;render();}).catch(function(e){alert(e.message);});
  }
  else if(action==="coach-save-program-btn"){
    var ti=document.getElementById("npTitle").value.trim();
    var ty=document.getElementById("npType").value.trim();
    if(!ti||!ty){alert("عنوان و نوع الزامی است");return;}
    api.coachCreateProgram({title:ti,type:ty,priceToman:Number(document.getElementById("npPrice").value)||0,description:document.getElementById("npDesc").value.trim()})
    .then(function(){alert("برنامه ساخته شد!");state.coachSub="mine";state._coachPrograms=null;render();
      api.coachPrograms().then(function(r){state._coachPrograms=r;render();}).catch(function(){state._coachPrograms=[];render();});
    }).catch(function(e){alert(e.message);});
  }
  else if(action==="coach-buy-plan"){
    if(!confirm("خرید این اشتراک؟"))return;
    api.coachSubscribe({planId:t.dataset.plan}).then(function(res){alert("ثبت شد! شناسه پرداخت: "+res.paymentId+"\nمبلغ: "+toFa(res.plan.priceToman)+" ت");}).catch(function(e){alert(e.message);});
  }
  else if(action==="coach-withdraw-btn"){
    var amt=prompt("مبلغ برداشت (تومان):","");if(!amt)return;
    api.coachWithdraw({amount:Number(amt),method:"bank"}).then(function(r){
      alert("ثبت شد! موجودی جدید: "+toFa(r.balance)+" ت");
      state._coachWallet=null;render();
      api.coachWallet().then(function(w){state._coachWallet=w;render();}).catch(function(){});
    }).catch(function(e){alert(e.message);});
  }
  else if(action==="coach-rate"){
    if(!state.authUser){alert("وارد شو");return;}
    api.coachRate({coachId:t.dataset.id,score:Number(t.dataset.score)}).then(function(r){alert("ثبت شد!");}).catch(function(e){alert(e.message);});
  }
  else if(action=="set-diet"){ state.dietType=t.dataset.val; saveJSON("ip_diet_type",t.dataset.val); render(); }
  else if(action=="apply-diet"){
    if(!confirm("برنامه غذایی فعلی با رژیم "+(DIET_PLANS[state.dietType]||{}).name+" جایگزین بشه؟")) return;
    state.nutrition=generateDietPlan(state.dietType,state.profile.goal);
    saveJSON("ip_nutrition",state.nutrition);
    alert("برنامه غذایی جدید ساخته شد! ✅");
    render();
  }
  else if(action=="ai-nutrition"){ generateAiNutrition(); }
  else if(action=="apply-ai-nutrition"){ applyAiNutritionResult(); }
});
document.addEventListener("keydown",function(e){
  if(e.target && e.target.id==="chatInput" && e.key==="Enter"){ e.preventDefault(); sendChat(); }
  if(e.target && /^auth/.test(e.target.id||"") && e.key==="Enter"){
    e.preventDefault();
    const map={login:"do-login",register:"do-register",verify:"do-verify","otp-verify":"do-otp-verify",forgot:"do-forgot"};
    if(state.authScreen==="login" && state.authMethod==="phone"){ doOtpRequest(); return; }
    const act=map[state.authScreen];
    if(act==="do-login") doLogin();
    else if(act==="do-register") doRegister();
    else if(act==="do-verify") doVerify();
    else if(act==="do-otp-verify") doOtpVerify();
    else if(act==="do-forgot") doForgotRequest();
  }
});
document.addEventListener("change",function(e){
  if(e.target && e.target.id==="restoreFile" && e.target.files && e.target.files[0]){
    importBackupFile(e.target.files[0]);
  }
  if(e.target && e.target.id==="photoFile" && e.target.files && e.target.files[0]){
    handlePhotoFile(e.target.files[0],function(dataUrl){ state.onboardData.photo=dataUrl; render(); });
  }
});
document.addEventListener("change",function(e){
  const t=e.target;
  if(t.dataset && t.dataset.weightFor){ saveWeight(t.dataset.ptype||"main",t.dataset.weightFor,t.value); render(); }
});
// فایل عکس چت
document.addEventListener("change",function(e){
  if(e.target && e.target.id==="chatPhotoFile" && e.target.files && e.target.files[0]){
    handlePhotoFile(e.target.files[0],function(dataUrl){ state.chatPhoto=dataUrl; render(); });
  }
  if(e.target && e.target.id==="caloriePhotoFile" && e.target.files && e.target.files[0]){
    handlePhotoFile(e.target.files[0],function(dataUrl){ state.caloriePhoto=dataUrl; state.caloriePhotoResult=null; render(); });
  }
});
// جستجوی زنده کالری با debounce (فوکس حفظ می‌شه)
let calSearchTimer=null;
document.addEventListener("input",function(e){
  if(e.target && e.target.id==="chatSearchInput"){
    state.chatSearch=e.target.value;
    return;
  }
  if(e.target && e.target.id==="calSearchInput"){
    state.calorieSearch=e.target.value;
    if(calSearchTimer) clearTimeout(calSearchTimer);
    calSearchTimer=setTimeout(function(){
      // فقط لیست نتایج رو آپدیت کن، نه کل صفحه رو
      const list=document.getElementById("calResultsList");
      if(list){
        list.innerHTML=renderCalorieResultsHTML();
        // فوکس رو به انتهای input برگردون
        const inp=document.getElementById("calSearchInput");
        if(inp){ const v=inp.value; inp.focus(); inp.value=""; inp.value=v; }
      }
    },250);
  }
});

render();
checkExistingSession();

/* ---------- PWA: نصب و آفلاین ---------- */
if("serviceWorker" in navigator){
  window.addEventListener("load", function(){
    navigator.serviceWorker.register("./sw.js").catch(function(){});
  });
}
let deferredInstallPrompt=null;
window.addEventListener("beforeinstallprompt", function(e){
  e.preventDefault();
  deferredInstallPrompt=e;
  state.canInstall=true;
  render();
});
window.addEventListener("appinstalled", function(){
  deferredInstallPrompt=null; state.canInstall=false; render();
});
function triggerInstall(){
  if(!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.finally(function(){ deferredInstallPrompt=null; state.canInstall=false; render(); });
}
