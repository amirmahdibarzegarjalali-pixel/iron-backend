<style>

  :root{
    --bg:#0A0B09; --panel:#131913; --border:rgba(76,122,82,0.3);
    --brass:#D8AE52; --brass2:#F2CE7A;
    --green:#1F9D55; --green2:#3DDC74;
    --ink:#C23B3B; --ink2:#FF5252;
    --purple:#8B6FD6; --purple2:#B79CFF;
    --text:#F3EEDD; --muted:#9A9484;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(circle at 50% -10%, rgba(61,220,116,0.10), transparent 55%), radial-gradient(circle at 95% 5%, rgba(255,82,82,0.08), transparent 50%), var(--bg);
    color:var(--text);
    font-family:'Vazirmatn','Tahoma',sans-serif;
    min-height:100vh;
    padding-bottom:90px;
  }
  .eyebrow{font-family:'Bebas Neue','Tahoma',sans-serif;letter-spacing:.12em;}
  .mono{font-family:'JetBrains Mono',monospace;}
  button{cursor:pointer;background:none;border:none;color:inherit;font-family:inherit;}
  input,select,textarea{background:transparent;color:var(--text);font-family:inherit;}
  input:focus,button:focus-visible,select:focus{outline:2px solid var(--green2);outline-offset:2px;}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:10px;}
  .wrap{padding:0 16px;max-width:560px;margin:0 auto;}
  .header{
    position:sticky;top:0;z-index:10;padding:20px 16px 14px;display:flex;align-items:center;justify-content:space-between;
    background:linear-gradient(var(--bg),rgba(10,11,9,.85));backdrop-filter:blur(6px);
  }
  .badge90{width:46px;height:46px;border-radius:50%;border:2px solid var(--brass);display:flex;align-items:center;justify-content:center;box-shadow:0 0 14px rgba(216,174,82,.35), inset 0 0 0 3px var(--border);flex-shrink:0;}
  .row{display:flex;align-items:center;gap:10px;}
  .tabbar{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(10,11,9,.92);border-top:1px solid var(--border);backdrop-filter:blur(8px);padding:8px;}
  .tabgrid{display:grid;grid-template-columns:repeat(6,1fr);max-width:560px;margin:0 auto;gap:2px;}
  .tabbtn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;border-radius:8px;transition:all .2s;}
  .tabbtn .ic{font-size:18px;transition:transform .2s;}
  .tabbtn:active .ic{transform:scale(.9);}
  .tabbtn.active .ic{filter:drop-shadow(0 0 6px rgba(216,174,82,.4));}
  .tabbtn .lb{font-size:9px;color:var(--muted);}
  .tabbtn.active{background:rgba(216,174,82,.06);}
  .tabbtn.active .lb{color:var(--brass);font-weight:700;}
  .progress-outer{height:9px;border-radius:99px;background:rgba(255,255,255,.06);overflow:hidden;}
  .progress-inner{height:100%;background:linear-gradient(90deg,var(--green),var(--green2));box-shadow:0 0 10px rgba(61,220,116,.5);transition:width .3s;}
  .hero-wrap{position:relative;height:112px;border-radius:10px 10px 0 0;overflow:hidden;}
  .hero-css{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
  .hero-pattern{position:absolute;inset:0;background-image:repeating-linear-gradient(135deg, rgba(255,255,255,.05) 0 2px, transparent 2px 18px);}
  .hero-emoji{position:relative;font-size:52px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.5));opacity:.92;}
  .hero-fade{position:absolute;inset:0;background:linear-gradient(to bottom, rgba(10,11,9,0) 35%, var(--panel) 100%);}
  .quote-strip{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:8px;background:linear-gradient(90deg, rgba(61,220,116,.08), rgba(255,82,82,.06));border:1px solid var(--border);font-size:12px;color:var(--text);margin-bottom:14px;}
  .ex-card{position:relative;display:flex;align-items:center;gap:7px;padding:14px;border-radius:8px;margin-bottom:10px;}
  .ex-num{width:28px;height:28px;border-radius:50%;border:1px solid var(--brass);color:var(--brass);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
  .ex-name{font-size:14px;font-weight:700;color:var(--text);}
  .ex-meta{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap;}
  .ex-presc{font-size:12px;font-weight:600;color:var(--brass2);}

  .ex-pr{font-size:10px;color:var(--ink2);border:1px solid rgba(255,82,82,.4);padding:1px 5px;border-radius:5px;}
  .ex-abs{font-size:10px;color:var(--purple2);border:1px solid rgba(183,156,255,.4);padding:1px 5px;border-radius:5px;}
  .ex-weight{width:46px;text-align:center;font-size:12px;border:1px solid var(--border);border-radius:6px;padding:6px 2px;}

  .iconbtn.done{background:var(--ink);border-color:var(--ink);color:#1A0E0C;box-shadow:0 0 10px rgba(255,82,82,.5);}
  .iconbtn.edit{border-color:rgba(216,174,82,.5);color:var(--brass);}
  .iconbtn.del{border-color:rgba(255,82,82,.5);color:var(--ink2);}

  @keyframes pulseglow{0%,100%{transform:scale(1);filter:drop-shadow(0 0 3px rgba(255,82,82,.5));}50%{transform:scale(1.18);filter:drop-shadow(0 0 9px rgba(255,82,82,.85));}}
  .pulse{display:inline-block;animation:pulseglow 1.8s ease-in-out infinite;}

  .done-banner{margin-top:14px;padding:12px;border-radius:8px;text-align:center;font-weight:800;font-size:14px;color:var(--green2);background:rgba(61,220,116,.08);border:1px solid rgba(61,220,116,.4);box-shadow:0 0 14px rgba(61,220,116,.2);}

  .day-icon{width:38px;height:38px;border-radius:50%;border:1px solid rgba(61,220,116,.45);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;}

  .accordion-row{display:flex;justify-content:space-between;font-size:14px;padding-top:10px;gap:8px;}
  .nutri-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .nutri-card{padding:14px;}
  .nutri-item{font-size:12px;color:var(--muted);margin-top:4px;display:flex;justify-content:space-between;gap:6px;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}

  .cal-cell.today{border-color:var(--brass);box-shadow:0 0 0 1px var(--brass), 0 0 8px rgba(216,174,82,.4);}
  .cal-cell.done{background:rgba(61,220,116,.14);}
  .cal-cell.missedcell{background:rgba(255,82,82,.08);}
  .cal-num{font-size:11px;}
  .month-label{font-size:12px;color:var(--brass);padding:10px 2px 6px;}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-top:8px;}
  .stat-input-full{width:100%;border:1px solid var(--border);border-radius:8px;padding:12px;font-size:14px;}
  .btn-full{width:100%;margin-top:10px;background:linear-gradient(90deg,var(--green),var(--green2));color:#0c1f12;padding:12px;border-radius:8px;font-weight:800;font-size:14px;text-align:center;box-shadow:0 0 14px rgba(61,220,116,.3);}
  .btn-outline{width:100%;margin-top:10px;background:transparent;border:1px solid var(--border);color:var(--text);padding:11px;border-radius:8px;font-weight:700;font-size:13px;text-align:center;}
  .btn-purple{background:linear-gradient(90deg,var(--purple),var(--purple2));color:#1b1330;}
  .btn-brass{background:linear-gradient(90deg,var(--brass),var(--brass2));color:#1A140B;}
  .chip{display:inline-flex;align-items:center;justify-content:center;padding:10px 8px;border-radius:8px;border:1px solid var(--border);font-size:12px;font-weight:700;text-align:center;}
  .chip.sel{border-color:var(--green2);color:var(--green2);background:rgba(61,220,116,.08);box-shadow:0 0 10px rgba(61,220,116,.2);}
  .chipgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;}
  .chipgrid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px;}

  @keyframes sqKnee{0%,100%{transform:rotate(0deg);}50%{transform:rotate(55deg);}}

  @keyframes hgKnee{0%,100%{transform:rotate(0deg);}50%{transform:rotate(14deg);}}

  .demo-hinge .j-hip{animation:hgHip 2s ease-in-out infinite;}
  .demo-hinge .j-knee{animation:hgKnee 2s ease-in-out infinite;}
  @keyframes prShoulder{0%,100%{transform:rotate(15deg);}50%{transform:rotate(-175deg);}}
  @keyframes prElbow{0%,100%{transform:rotate(115deg);}50%{transform:rotate(8deg);}}
  .demo-press .j-shoulder{animation:prShoulder 1.6s ease-in-out infinite;}
  .demo-press .j-elbow{animation:prElbow 1.6s ease-in-out infinite;}
  @keyframes plShoulder{0%,100%{transform:rotate(-175deg);}50%{transform:rotate(15deg);}}
  @keyframes plElbow{0%,100%{transform:rotate(8deg);}50%{transform:rotate(115deg);}}
  .demo-pull .j-shoulder{animation:plShoulder 1.7s ease-in-out infinite;}
  .demo-pull .j-elbow{animation:plElbow 1.7s ease-in-out infinite;}

  .demo-curl .j-elbow{animation:clElbow 1.3s ease-in-out infinite;}
  @keyframes rsShoulder{0%,100%{transform:rotate(0deg);}50%{transform:rotate(-95deg);}}
  .demo-raise .j-shoulder{animation:rsShoulder 1.5s ease-in-out infinite;}
  @keyframes lcKnee{0%,100%{transform:rotate(0deg);}50%{transform:rotate(-90deg);}}

  @keyframes cfKnee{0%,100%{transform:rotate(0deg);}50%{transform:rotate(10deg);}}
  .demo-calf .j-knee{animation:cfKnee 1s ease-in-out infinite;}
  @media (prefers-reduced-motion: reduce){
    .j-hip,.j-knee,.j-torso,.j-shoulder,.j-elbow{animation:none !important;}
  }
  .confetti-piece{position:fixed;top:-10px;z-index:60;pointer-events:none;border-radius:2px;}
  @keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(540deg);opacity:0;}}
  .modal-backdrop{position:fixed;inset:0;background:rgba(5,6,4,.78);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal-card{background:var(--panel);border:1px solid var(--brass);border-radius:12px;padding:20px;max-width:420px;width:100%;box-shadow:0 0 30px rgba(216,174,82,.25);}
  .step-dots{display:flex;gap:6px;justify-content:center;margin:14px 0 4px;}
  .step-dot{width:7px;height:7px;border-radius:50%;background:var(--border);}
  .step-dot.on{background:var(--brass);}
  .plusbtn{width:44px;border-radius:8px;font-weight:800;flex-shrink:0;}
  .editbar{display:flex;justify-content:flex-end;margin-bottom:8px;}
  .editbtn{font-size:12px;border:1px solid var(--brass);color:var(--brass);padding:6px 12px;border-radius:20px;font-weight:700;}
  .editbtn.on{background:var(--brass);color:#1A140B;}
  .photo-preview{width:100%;max-width:220px;border-radius:10px;margin-top:10px;border:1px solid var(--border);}
  label.flabel{font-size:12px;color:var(--muted);margin-top:10px;display:block;}
  /* شبکه‌ی واکنش‌گرا برای فیلدها و دکمه‌ها — مناسب موبایل/اندروید */
  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .field-grid .full{grid-column:1 / -1;}
  .calc-btn{width:100%;padding:13px;border-radius:8px;font-weight:800;font-size:13px;background:linear-gradient(90deg,var(--brass),var(--brass2));color:#1A140B;box-shadow:0 0 12px rgba(216,174,82,.25);border:none;cursor:pointer;}
  @media (max-width:340px){ .field-grid{grid-template-columns:1fr;} }
</style>

<!-- کتابخانه‌های تولید PDF (خروجی برنامه به صورت فایل پی‌دی‌اف) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
/* ---------- Jalali calendar conversion ---------- */
function div(a,b){return ~~(a/b);}
function mod(a,b){return a-~~(a/b)*b;}
function g2d(gy,gm,gd){
  let d=div((gy+div(gm-8,6)+100100)*1461,4)+div(153*mod(gm+9,12)+2,5)+gd-34840408;
  d=d-div(div(gy+100100+div(gm-8,6),100)*3,4)+752;
  return d;
}
function d2g(jdn){
  let j=4*jdn+139361631;
  j=j+div(div(4*jdn+183187720,146097)*3,4)*4-3908;
  const i=div(mod(j,1461),4)*5+308;
  const gd=div(mod(i,153),5)+1;
  const gm=mod(div(i,153),12)+1;
  const gy=div(j,1461)-100100+div(8-gm,6);
  return [gy,gm,gd];
}
function jalCal(jy){
  const breaks=[-61,9,38,199,426,686,756,818,1111,1181,1210,1635,2060,2097,2192,2262,2324,2394,2456,3178];
  const bl=breaks.length; const gy=jy+621; let leapJ=-14; let jp=breaks[0];
  if(jy<jp||jy>=breaks[bl-1]) return {leap:0,gy,march:20};
  let jump=0,i=1;
  for(;i<bl;i+=1){ const jm=breaks[i]; jump=jm-jp; if(jy<jm) break; leapJ=leapJ+div(jump,33)*8+div(mod(jump,33),4); jp=jm; }
  let n=jy-jp;
  leapJ=leapJ+div(n,33)*8+div(mod(n,33)+3,4);
  if(mod(jump,33)===4 && jump-n===4) leapJ+=1;
  const leapG=div(gy,4)-div((div(gy,100)+1)*3,4)-150;
  const march=20+leapJ-leapG;
  if(jump-n<6) n=n-jump+div(jump+4,33)*33;
  let leap=mod(mod(n+1,33)-1,4);
  if(leap===-1) leap=4;
  return {leap,gy,march};
}
function d2j(jdn){
  const gy=d2g(jdn)[0]; let jy=gy-621; const r=jalCal(jy);
  const jdn1f=g2d(gy,3,r.march); let k=jdn-jdn1f;
  if(k>=0){ if(k<=185) return [jy,1+div(k,31),mod(k,31)+1]; k-=186; }
  else { jy-=1; k+=179; if(r.leap===1) k+=1; }
  return [jy,7+div(k,30),mod(k,30)+1];
}
function gregorianToJalali(gy,gm,gd){ return d2j(g2d(gy,gm,gd)); }
function jalaliToGreg(jy,jm,jd){ const r=jalCal(jy); const jdn=g2d(r.gy,3,r.march)+(jm-1)*31-div(jm,7)*(jm-7)+jd-1; return d2g(jdn); }
const FA=["۰","۱","۲","۳","۴","۵","۶","۷","۸","۹"];
function toFa(x){ return String(x).replace(/[0-9]/g,d=>FA[Number(d)]); }
const MONTHS=["فروردین","اردیبهشت","خرداد","تیر","مرداد","شهریور","مهر","آبان","آذر","دی","بهمن","اسفند"];
const WDAYS=["شنبه","یکشنبه","دوشنبه","سه‌شنبه","چهارشنبه","پنجشنبه","جمعه"];
function wdIndex(d){ return (d.getDay()+1)%7; }
function jalOf(d){ return gregorianToJalali(d.getFullYear(),d.getMonth()+1,d.getDate()); }
function keyOf(d){ const j=jalOf(d); return j[0]+"-"+j[1]+"-"+j[2]; }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
function uid(prefix){ return prefix+"_"+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function aparatSearchUrl(name){ return "https://www.aparat.com/result/"+encodeURIComponent(name.split(" ").join("_")); }

/* ---------- Storage ---------- */
function loadJSON(key,fallback){ try{ const v=localStorage.getItem(key); return v?JSON.parse(v):fallback; }catch(e){ return fallback; } }
function saveJSON(key,val){ try{ localStorage.setItem(key,JSON.stringify(val)); }catch(e){} }

/* ================= کلاینت API بک‌اند (حساب کاربری واقعی) =================
   بعد از دیپلوی بک‌اند (پوشه‌ی iron-backend) روی یک سرور واقعی، آدرسش رو
   اینجا جایگزین کن. تا وقتی این مقدار پیش‌فرض بمونه، برنامه به‌صورت آفلاین
   کار می‌کنه اما بخش‌های "حساب کاربری" و "همگام‌سازی" غیرفعال می‌مونن. */
const API_BASE_URL = (window.IRON_API_BASE || "https://iron-backend-sn2p.onrender.com") + "/api";

function getTokens(){ return { access: localStorage.getItem("ip_access_token"), refresh: localStorage.getItem("ip_refresh_token") }; }
function setTokens(access, refresh){
  if(access) localStorage.setItem("ip_access_token", access);
  if(refresh) localStorage.setItem("ip_refresh_token", refresh);
}
function clearTokens(){ localStorage.removeItem("ip_access_token"); localStorage.removeItem("ip_refresh_token"); }

async function apiRequest(path, { method="GET", body=null, auth=false, isMultipart=false } = {}){
  const headers={};
  let fetchBody;
  if(isMultipart){ fetchBody=body; }
  else if(body!==null){ headers["Content-Type"]="application/json"; fetchBody=JSON.stringify(body); }
  if(auth){
    const t=getTokens();
    if(t.access) headers["Authorization"]="Bearer "+t.access;
  }
  let res;
  try{
    res=await fetch(API_BASE_URL+path, { method, headers, body: fetchBody });
  }catch(networkErr){
    const e=new Error("سرور در دسترس نیست. اتصال اینترنت یا آدرس بک‌اند رو بررسی کن.");
    e.offline=true; throw e;
  }
  let data=null;
  try{ data=await res.json(); }catch(e){ /* بدون بدنه */ }
  if(res.status===401 && auth){
    const refreshed=await tryRefreshToken();
    if(refreshed){
      return apiRequest(path, { method, body, auth, isMultipart });
    }
  }
  if(!res.ok){
    const err=new Error((data&&data.error)||"خطایی رخ داد");
    err.status=res.status; err.data=data;
    throw err;
  }
  return data;
}
let refreshInFlight=null;
async function tryRefreshToken(){
  const t=getTokens();
  if(!t.refresh) return false;
  if(!refreshInFlight){
    refreshInFlight=fetch(API_BASE_URL+"/auth/refresh",{
      method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({refreshToken:t.refresh})
    }).then(function(r){ return r.ok ? r.json() : null; }).catch(function(){ return null; })
      .finally(function(){ refreshInFlight=null; });
  }
  const result=await refreshInFlight;
  if(result && result.accessToken){ setTokens(result.accessToken, result.refreshToken); return true; }
  clearTokens();
  return false;
}

/* ---------- Sound & vibration ---------- */
function playTone(freq,dur){
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(); const g=ctx.createGain();
    o.frequency.value=freq; o.type="sine"; o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.18, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
    o.start(); o.stop(ctx.currentTime+dur);
  }catch(e){}
}
function tickFeedback(){ try{ if(navigator.vibrate) navigator.vibrate(35); }catch(e){} playTone(660,0.12); }
function celebrationFeedback(){ try{ if(navigator.vibrate) navigator.vibrate([100,60,100,60,200]); }catch(e){} playTone(523,0.15); setTimeout(function(){playTone(659,0.15);},150); setTimeout(function(){playTone(784,0.25);},300); }
function timerEndFeedback(){ try{ if(navigator.vibrate) navigator.vibrate([200,100,200]); }catch(e){} playTone(880,0.3); }

function startTimer(seconds){
  timerRemaining=seconds;
  const bar=document.getElementById("restTimerBar");
  bar.style.display="flex";
  renderTimerBar();
  clearInterval(timerInterval);
  timerInterval=setInterval(function(){
    timerRemaining-=1;

      timerEndFeedback();

function fireConfetti(){
  try{
    const colors=["#3DDC74","#D8AE52","#FF5252","#F2CE7A"];
    for(let i=0;i<26;i++){
      const el=document.createElement("div");
      el.className="confetti-piece";
      const size=5+Math.random()*5;
      el.style.width=size+"px"; el.style.height=(size*1.6)+"px";
      el.style.left=(Math.random()*100)+"vw";
      el.style.background=colors[Math.floor(Math.random()*colors.length)];
      const dur=2+Math.random()*1.5;
      el.style.animation="confettiFall "+dur+"s ease-in forwards";
      el.style.animationDelay=(Math.random()*0.4)+"s";
      document.body.appendChild(el);
      setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); },(dur+0.6)*1000);
    }
  }catch(e){}
}

function pickN(arr,n){ return (arr||[]).slice(0,Math.max(0,n)); }
function countForLevel(level){ return level==="amateur"?2:level==="pro"?4:3; }

// می‌سازه: {days:[{...meta, exercises:[...]}, ...rest as null]} برای هفت‌روز
function buildProgram(profile, location){
  const LIB = location==="home" ? LIB_HOME : LIB_GYM;
  const tmpl = weekTemplateFor(profile.daysPerWeek);
  const cardioKey = profile.gender==="female" ? "هوازی_زن" : "هوازی_مرد";
  const n = countForLevel(profile.level);
  const days = tmpl.map(function(slot,i){
    if(slot.type==="rest"){ return {type:"rest",title:"استراحت / ریکاوری",eyebrow:"REST DAY",emoji:"🌙",heroGrad:heroGradFor(i),exercises:[]}; }
    let exs=[];
    const focusList = slot.full ? slot.focus : slot.focus;
    focusList.forEach(function(g){
      const pool=LIB[g]||[];
      const picks=pickN(pool, slot.full?2:n);
      picks.forEach(function(p){
        exs.push({id:uid("ex"),refId:p.id,group:g,name:p.name,video:p.video,archetype:p.archetype,presc:prescFor(profile.goal,profile.level,p.compound)});
      });
    });
    if(slot.extra){
      slot.extra.forEach(function(g){
        const pool=LIB[g]||[];
        const picks=pickN(pool, Math.max(2,n-1));
        picks.forEach(function(p){
          exs.push({id:uid("ex"),refId:p.id,group:g,name:p.name,video:p.video,archetype:p.archetype,presc:prescFor(profile.goal,profile.level,p.compound)});
        });
      });
    }
    if(slot.cardio){
      const cpool=LIB[cardioKey]||[];
      pickN(cpool,2).forEach(function(p){
        exs.push({id:uid("ex"),refId:p.id,group:"هوازی",name:p.name,video:p.video,archetype:p.archetype,presc:profile.goal==="fatloss"?"۳۵-۵۰ دقیقه":"۲۵-۳۵ دقیقه"});
      });
    }
    // شکم انتهای هر برنامه (به جز روزی که خودش شکم‌محوره که از قبل شکم داره)
    if(slot.focus.indexOf("شکم")===-1){
      const apool=LIB["شکم"]||[];
      pickN(apool,3).forEach(function(p){
        exs.push({id:uid("ex"),refId:p.id,group:"شکم",name:p.name,video:p.video,archetype:p.archetype,presc:prescFor(profile.goal,profile.level,false),isFinisher:true});
      });
    } else {
      // خودِ روز شکم محوره؛ حداقل ۳ تا حرکت شکم تضمین بشه
      const already=exs.filter(function(e){return e.group==="شکم";}).length;
      if(already<3){
        const apool=(LIB["شکم"]||[]).slice(already);
        pickN(apool,3-already).forEach(function(p){
          exs.push({id:uid("ex"),refId:p.id,group:"شکم",name:p.name,video:p.video,archetype:p.archetype,presc:prescFor(profile.goal,profile.level,false)});
        });
      }
    }
    return {type:"workout",title:slot.title,eyebrow:slot.eyebrow,emoji:slot.emoji,heroGrad:heroGradFor(i),exercises:exs};
  });
  return days;
}

function toggleMemoryItem(kind,name){
  const mem=getMemory();
  const list=mem[kind]||[];
  const i=list.indexOf(name);
  if(i===-1){ list.push(name); } else { list.splice(i,1); }

  saveMemory(mem);
  return mem;
}

// محاسبه‌ی کالری و ماکروی هدف روزانه (Mifflin-St Jeor)
function calcDailyTarget(){
  const p=state.profile; if(!p) return null;
  const w=Number(p.weight)||70, h=Number(p.height)||170, a=Number(p.age)||25;
  let bmr = p.gender==="female" ? (10*w + 6.25*h - 5*a -161) : (10*w + 6.25*h - 5*a +5);
  const actFactor = p.level==="pro" ? 1.6 : p.level==="beginner" ? 1.4 : 1.5;
  let tdee = bmr * actFactor;
  if(p.goal==="cut"||p.goal==="fatloss") tdee -= 400;
  else if(p.goal==="bulk") tdee += 350;
  tdee = Math.round(tdee/10)*10;
  const protein = Math.round(w * (p.goal==="cut"||p.goal==="fatloss" ? 2.2 : 1.8));
  const fat = Math.round(tdee * 0.25 / 9);
  const carbs = Math.round((tdee - protein*4 - fat*9)/4);
  return {kcal:tdee, protein:protein, carbs:carbs, fat:fat};
}

  saveJSON("ip_quick_program",state.quickProgram);
  saveJSON("ip_home_program",state.homeProgram);
}
function regeneratePrograms(){
  state.mainProgram=buildProgram(state.profile,"gym");
  // برنامه‌ی سریع: همون کتابخانه ولی چیدمان جابه‌جا برای تنوع
  const tmplShift=JSON.parse(JSON.stringify(state.profile));
  state.quickProgram=buildProgram(tmplShift,"gym");
  // یک‌کم بچرخونیم که با برنامه اصلی فرق کنه
  state.quickProgram.push(state.quickProgram.shift());
  state.homeProgram=buildProgram(state.profile,"home");
  state.pointer=0;
  state.pointerDate=todayKey;
  saveJSON("ip_pointer",state.pointer);
  saveJSON("ip_pointer_date",state.pointerDate);
  persistProfileAndPrograms();
}

function programTypeArr(t){
  if(t==="quick") return state.quickProgram;
  if(t==="home") return state.homeProgram;
  return state.mainProgram;
}
function progressStoreOf(t){
  if(t==="quick") return state.quickProgress;
  if(t==="home") return state.homeProgress;
  return state.progress;
}
function progressKeyOf(t){
  if(t==="quick") return "ip_quick_progress";
  if(t==="home") return "ip_home_progress";
  return "ip_progress";
}
function activeIndexOf(t){
  if(t==="main") return ((state.pointer%7)+7)%7;
  return weekdayIndex;
}
function dayDoneCount(t,dateKey,dayIdx){
  const arr=programTypeArr(t);
  const day=arr[dayIdx];
  if(!day || day.type!=="workout") return {done:0,total:0};
  const store=progressStoreOf(t);
  const rec=(store[dateKey]&&store[dateKey].exercises)||{};
  const total=day.exercises.length;
  const done=day.exercises.filter(function(e){return rec[e.id]&&rec[e.id].done;}).length;
  return {done:done,total:total};
}

/* ---------- منطق روز جاافتاده (درخواست ۱) ---------- */
function resolveCarry(){
  if(!state.profile || !state.mainProgram) return;
  if(state.pointerDate===todayKey) return; // امروز قبلاً رسیدگی شده
  const prevDateKnown=!!state.pointerDate;
  if(prevDateKnown){
    const idx=activeIndexOf("main");
    const slot=state.mainProgram[idx];
    if(slot && slot.type==="workout"){
      const dc=dayDoneCount("main",state.pointerDate,idx);
      const homeDidIt=!!state.homeUsedDates[state.pointerDate];
      const fullyDone = dc.total>0 && dc.done===dc.total;
      if(!fullyDone && !homeDidIt){
        state.carryDecision={idx:idx,title:slot.title};
        return; // منتظر پاسخ کاربر می‌مونیم، pointer رو جابه‌جا نمی‌کنیم
      }
    }
    state.pointer=(state.pointer+1)%7;
    saveJSON("ip_pointer",state.pointer);
  }
  state.pointerDate=todayKey;
  saveJSON("ip_pointer_date",state.pointerDate);
}
function answerCarry(didItYesterday){
  if(!state.carryDecision) return;
  if(didItYesterday){ state.pointer=(state.pointer+1)%7; saveJSON("ip_pointer",state.pointer); }
  // اگه نه: pointer عوض نمیشه، یعنی همون برنامه‌ی دیروز امروز اجرا میشه
  state.carryDecision=null;
  state.pointerDate=todayKey;
  saveJSON("ip_pointer_date",state.pointerDate);
  render();
}

// اعتبارسنجی ایمیل
function isValidEmail(s){ return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(s); }
// اعتبارسنجی موبایل ایرانی
function isValidPhone(s){ return /^09\d{9}$/.test(s.replace(/[\s-]/g,"")); }
// پاکسازی متن ورودی برای جلوگیری از تزریق
function sanitizeInput(s){ return String(s||"").replace(/[<>]/g,"").trim().slice(0,200); }

async function doRegister(){
  const name=authField("authName");
  const contact=authField("authContact");
  const password=authField("authPassword");
  const password2=authField("authPassword2");
  if(!name){ return setAuthError("نام رو وارد کن"); }
  if(!contact){ return setAuthError(state.authMethod==="email"?"ایمیل رو وارد کن":"شماره موبایل رو وارد کن"); }
  if(state.authMethod==="email" && !isValidEmail(contact)){ return setAuthError("فرمت ایمیل درست نیست (مثال: name@example.com)"); }
  if(state.authMethod==="phone" && !isValidPhone(contact)){ return setAuthError("شماره موبایل باید ۱۱ رقم و با ۰۹ شروع بشه (مثال: 09123456789)"); }
  if(name.length>50){ return setAuthError("نام نباید بیشتر از ۵۰ کاراکتر باشه"); }
  if(!password || password.length<8){ return setAuthError("رمز عبور باید حداقل ۸ کاراکتر باشد"); }
  if(password!==password2){ return setAuthError("تکرار رمز عبور مطابقت ندارد"); }
  state.authLoading=true; state.authError=""; render();
  try{
    const body={ name, password };
    if(state.authMethod==="email") body.email=contact; else body.phone=contact;
    const res=await api.register(body);
    state.pendingVerification={ userId:res.userId, method:res.method, contact };
    state.authScreen="verify";
  }catch(e){
    state.authError=e.message||"خطا در ثبت‌نام";
  }
  state.authLoading=false; render();
}

async function doVerify(){
  const code=authField("authCode");
  if(!code || code.length<4){ return setAuthError("کد تایید رو کامل وارد کن"); }
  if(!state.pendingVerification){ return setAuthError("درخواست نامعتبر است، دوباره ثبت‌نام کن"); }
  state.authLoading=true; state.authError=""; render();
  try{

    onAuthSuccess(res);
  }catch(e){
    state.authError=e.message||"کد نامعتبر است";
  }
  state.authLoading=false; render();
}

async function doLogin(){
  const contact=authField("authContact");
  const password=authField("authPassword");
  if(!contact || !password){ return setAuthError("همه‌ی فیلدها رو پر کن"); }
  if(state.authMethod==="email" && !isValidEmail(contact)){ return setAuthError("فرمت ایمیل درست نیست"); }
  if(state.authMethod==="phone" && !isValidPhone(contact)){ return setAuthError("شماره موبایل نامعتبره"); }
  state.authLoading=true; state.authError=""; render();
  try{

    const res=await api.login(body);

      state.pendingVerification={ userId:e.data.userId, method:e.data.method, contact };
      state.authScreen="verify";

}

function onAuthSuccess(res){
  const wasGuestWithProfile = state.guestMode && state.profile && state.profile.setupDone;
  setTokens(res.accessToken, res.refreshToken);
  state.authUser=res.user;
  saveJSON("ip_auth_user", res.user);
  state.pendingVerification=null;
  state.authError="";
  state.guestMode=false;
  saveJSON("ip_guest_mode",false);
  state.forceAuthScreen=false;
  if(wasGuestWithProfile){
    // کاربر مهمان بود و از قبل برنامه‌ی محلی کامل داشت؛ به‌جای بازنویسی، همون رو به سرور می‌فرستیم
    syncLocalProfileAfterUpgrade();
    render();
  } else {
    applyServerProfile(res.user);
  }
}

function applyServerProfile(user){
  const p=user.profile||{};
  const complete = p.gender && p.trainingGoal && p.trainingLevel;
  if(complete){
    const existingDays=(state.profile && state.profile.daysPerWeek) || 4;
    state.profile={
      name:user.name, gender:p.gender, level:p.trainingLevel, goal:p.trainingGoal,
      daysPerWeek:existingDays, height:p.height, weight:p.weight, age:p.age,
      photo:user.avatarUrl||null, setupDone:true, createdAt:state.profile?state.profile.createdAt:todayKey
    };
    saveJSON("ip_profile", state.profile);
    if(!state.mainProgram || !state.mainProgram.length){ regeneratePrograms(); }
  } else {
    // پروفایل کامل نیست؛ کاربر باید ویزارد آنبوردینگ (هدف/سطح/فیزیک/عکس) رو تکمیل کنه
    state.onboardData.name=user.name;
    state.profile=null;
  }
  render();
}

async function checkExistingSession(){
  const t=getTokens();
  const cachedUser=loadJSON("ip_auth_user",null);
  if(cachedUser) state.authUser=cachedUser;
  if(!t.access){ state.checkingSession=false; render(); return; }
  try{
    const user=await api.me();
    state.authUser=user;
    saveJSON("ip_auth_user", user);
    applyServerProfile(user);
  }catch(e){
    if(e.offline && cachedUser){
      // آفلاینیم ولی قبلاً وارد شده بودیم؛ با نسخه‌ی کش‌شده ادامه می‌دیم
      applyServerProfile(cachedUser);
    } else if(e.status===401){
      clearTokens(); localStorage.removeItem("ip_auth_user"); state.authUser=null;
    }
  }
  state.checkingSession=false;
  render();
}

function toggleExercise(ptype,dayIdx,id){
  const store=progressStoreOf(ptype);
  const day=store[todayKey]||{exercises:{}};
  const cur=day.exercises[id]||{};
  const nowDone=!cur.done;
  day.exercises[id]=Object.assign({},cur,{done:nowDone});
  store[todayKey]=day;
  saveJSON(progressKeyOf(ptype),store);
  if(ptype==="home"){ state.homeUsedDates[todayKey]=true; saveJSON("ip_home_used",state.homeUsedDates); }
  if(nowDone){
    tickFeedback();
    const arr=programTypeArr(ptype);
    const exs=arr[dayIdx]?arr[dayIdx].exercises:[];
    const doneCount=exs.filter(function(e){return day.exercises[e.id]&&day.exercises[e.id].done;}).length;
    if(exs.length>0 && doneCount===exs.length){ setTimeout(function(){ celebrationFeedback(); fireConfetti(); },250); trackBehavior("workout_complete"); }
  }
}
function saveWeight(ptype,id,val){
  const store=progressStoreOf(ptype);
  const day=store[todayKey]||{exercises:{}};
  const cur=day.exercises[id]||{};
  day.exercises[id]=Object.assign({},cur,{weight:val});
  store[todayKey]=day;
  saveJSON(progressKeyOf(ptype),store);
  const num=Number(val);
  if(!isNaN(num) && num>0){
    const key=ptype+"_"+id;
    if(!state.prs[key] || num>state.prs[key]){
      state.prs[key]=num; saveJSON("ip_prs",state.prs);
      const arr=programTypeArr(ptype);
      const dayObj=arr.find(function(d){ return d.exercises && d.exercises.some(function(e){return e.id===id;}); });
      const ex=dayObj?dayObj.exercises.find(function(e){return e.id===id;}):null;
      if(state.authUser && ex){ api.addPr({ exerciseName:ex.name, weight:num }).catch(function(){}); }
      // ASCUS فاز ۳: تبریک خودکار رکورد جدید
      celebratePR(ex.name,num);
    }
  }
}

function liveNext(){
  const ptype=state.livePType;

  const ex=exs[state.liveIndex];

  const rest=ex?defaultRest(ex):null;

function exportBackup(){
  const data={
    profile:state.profile, mainProgram:state.mainProgram, quickProgram:state.quickProgram, homeProgram:state.homeProgram,
    progress:state.progress, quickProgress:state.quickProgress, homeProgress:state.homeProgress,
    bodyStats:state.bodyStats, prs:state.prs, chat:state.chat, nutrition:state.nutrition,
    healthPrefs:state.healthPrefs, behavior:loadJSON("ip_behavior",null), aiMemory:state.aiMemory,
    coachPersonality:state.coachPersonality, calorieLog:state.calorieLog,
    dietType:state.dietType, 
    pointer:state.pointer, pointerDate:state.pointerDate, homeUsedDates:state.homeUsedDates, start:startKey
  };
  const blob=new Blob([JSON.stringify(data)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url; a.download="iron-protocol-backup.json";
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); },1000);
}
  function importBackupFile(file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      const map={profile:"ip_profile",mainProgram:"ip_program",quickProgram:"ip_quick_program",homeProgram:"ip_home_program",progress:"ip_progress",quickProgress:"ip_quick_progress",homeProgress:"ip_home_progress",bodyStats:"ip_bodystats",prs:"ip_prs",chat:"ip_chat",nutrition:"ip_nutrition",pointer:"ip_pointer",pointerDate:"ip_pointer_date",homeUsedDates:"ip_home_used",start:"ip_start",
      healthPrefs:"ip_health_prefs",behavior:"ip_behavior",aiMemory:"ip_ai_memory",coachPersonality:"ip_coach_personality",calorieLog:"ip_calorie_log",dietType:"ip_diet_type"};
      Object.keys(map).forEach(function(k){ if(data[k]!==undefined){ saveJSON(map[k],data[k]); } });
      alert("بازگردانی شد ✅ صفحه رو رفرش کن تا کامل اعمال بشه.");
      location.reload();
    }catch(err){ alert("فایل پشتیبان معتبر نیست"); }
  };
  reader.readAsText(file);
}

async function exportProgramPDF(){
  if(!window.jspdf || !window.html2canvas){
    alert("کتابخانه‌ی تولید PDF هنوز کامل بارگذاری نشده. لطفاً اتصال اینترنتت رو بررسی کن و دوباره امتحان کن.");
    return;
  }
  showPdfLoading(true);
  try{
    await document.fonts.ready;
    const wrap=document.createElement("div");
    wrap.style.cssText="position:fixed;left:-10000px;top:0;width:794px;background:#ffffff;color:#1a1a1a;font-family:'Vazirmatn','Tahoma',sans-serif;direction:rtl;padding:36px;";
    wrap.innerHTML=buildProgramPDFHTML();
    document.body.appendChild(wrap);

    const canvas=await html2canvas(wrap,{scale:2,backgroundColor:"#ffffff",useCORS:true,windowWidth:794});
    document.body.removeChild(wrap);

    const imgData=canvas.toDataURL("image/jpeg",0.92);
    const { jsPDF }=window.jspdf;
    const pdf=new jsPDF("p","mm","a4");
    const pageW=210, pageH=297;
    const imgW=pageW;
    const imgH=canvas.height*imgW/canvas.width;
    let heightLeft=imgH, position=0;
    pdf.addImage(imgData,"JPEG",0,position,imgW,imgH);
    heightLeft-=pageH;
    while(heightLeft>0){
      position-=pageH;
      pdf.addPage();
      pdf.addImage(imgData,"JPEG",0,position,imgW,imgH);
      heightLeft-=pageH;
    }
    const ptype=state.pdfExportType||"main";
    pdf.save("iron-"+ptype+"-"+todayKey+".pdf");
  }catch(e){
    alert("ساخت PDF ناموفق بود: "+(e.message||e));
  }
  showPdfLoading(false);
}

function dataUrlToBlob(dataUrl){
  const parts=dataUrl.split(",");
  const mimeMatch=/data:(.*?);base64/.exec(parts[0]);
  const mime=mimeMatch?mimeMatch[1]:"image/jpeg";
  const bin=atob(parts[1]);
  const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new Blob([arr],{type:mime});
}

const MAX_PHOTO_BYTES=2*1024*1024; // حداکثر ۲ مگابایت قبل از فشرده‌سازی
function handlePhotoFile(file,cb){
  if(!file) return;
  if(file.size>8*1024*1024){ alert("حجم عکس خیلی زیاده (بیش از ۸ مگ). یه عکس کوچیک‌تر انتخاب کن."); return; }
  // فشرده‌سازی عکس با canvas تا حجمش زیر ۲ مگابایت بشه
  const img=new Image();
  const reader=new FileReader();
  reader.onload=function(e){
    img.onload=function(){
      let w=img.width, h=img.height;
      const maxDim=1280; // حداکثر ابعاد
      if(w>maxDim||h>maxDim){ const r=Math.min(maxDim/w,maxDim/h); w=Math.round(w*r); h=Math.round(h*r); }
      const canvas=document.createElement("canvas");
      canvas.width=w; canvas.height=h;
      const ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,w,h);
      let quality=0.82;
      let dataUrl=canvas.toDataURL("image/jpeg",quality);
      // اگه هنوز خیلی بزرگه، کیفیت رو کم کن
      while(dataUrl.length>1.5*1024*1024 && quality>0.4){ quality-=0.1; dataUrl=canvas.toDataURL("image/jpeg",quality); }
      cb(dataUrl);
    };
    img.onerror=function(){ cb(e.target.result); }; // اگه فشرده‌سازی نشد، اصلش رو بفرست
    img.src=e.target.result;
  };
  reader.onerror=function(){ alert("خوندن فایل ناموفق بود."); };
  reader.readAsDataURL(file);
}

      '<button class="btn-outline" data-action="pick-photo">📷 انتخاب عکس</button>'+
      (d.photo?'<img class="photo-preview" src="'+d.photo+'" />':'');
  }
  const dots=[0,1,2,3,4].map(function(i){return '<span class="step-dot '+(i===step?'on':'')+'"></span>';}).join("");
  return '<div class="wrap" style="padding-top:30px;"><div class="panel" style="padding:20px;">'+
    inner+
    '<div class="step-dots">'+dots+'</div>'+
    '<div class="row" style="margin-top:14px;">'+
      (step>0?'<button class="btn-outline" style="flex:1;margin-top:0;" data-action="onb-back">بازگشت</button>':'')+
      '<button class="btn-full" style="flex:2;margin-top:0;" data-action="onb-next">'+(step===4?'شروع کن 🔥':'بعدی')+'</button>'+
    '</div>'+
  '</div></div>';
}

  const pct=day.exercises.length?Math.round(doneCount/day.exercises.length*100):0;

    html+='<div style="margin-top:16px;">'+
      '<div class="row" style="justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:4px;">'+
        '<span>پیشرفت امروز</span><span class="mono">'+toFa(doneCount)+'/'+toFa(day.exercises.length)+'</span>'+

    html+='<div style="margin-top:14px;font-size:13px;color:var(--muted);">امروز روز استراحت یا ریکاوریه. یه هوازی سبک یا کشش کافیه 🌙</div>';
  }
  html+='</div></div>';

  html+='<div class="section-gap">';
  day.exercises.forEach(function(ex,i){ html+=exerciseCard(ex,i,ptype,dayIdx,dayState,editing); });

}

function renderCalendar(){
  const days=[];
  for(let i=0;i<90;i++){
    const d=new Date(today); d.setDate(today.getDate()+i);
    const wd=wdIndex(d); const j=jalOf(d); const jy=j[0],jm=j[1],jd=j[2]; const key=jy+"-"+jm+"-"+jd;
    const isToday=i===0; const isPast=d<today && !isToday;
    // برای روزهای گذشته/امروز از داده‌ی واقعی پیشرفت اصلی استفاده می‌کنیم (بدون در نظر گرفتن جابه‌جایی pointer برای سادگی نمایش)
    const rec=Object.values((state.progress[key]&&state.progress[key].exercises)||{});
    const doneCnt=rec.filter(function(s){return s.done;}).length;
    const homeDid=!!state.homeUsedDates[key];
    const hasAny=doneCnt>0||homeDid;
    days.push({jy:jy,jm:jm,jd:jd,wd:wd,key:key,isToday:isToday,completed:hasAny,missed:isPast&&!hasAny});
  }
  let html='<div class="cal-grid section-gap">';
  WDAYS.forEach(function(n){ html+='<div style="text-align:center;font-size:10px;color:var(--muted);">'+n.slice(0,2)+'</div>'; });
  html+='</div>';
  let months=[];
  days.forEach(function(d){
    const last=months[months.length-1];
    if(!last || last.jm!==d.jm || last.jy!==d.jy){ months.push({jy:d.jy,jm:d.jm,days:[d]}); }
    else { last.days.push(d); }
  });
  months.forEach(function(month){
    html+='<div class="month-label eyebrow" dir="ltr">'+MONTHS[month.jm-1].toUpperCase()+' '+toFa(month.jy)+'</div>';
    html+='<div class="cal-grid">';
    for(let b=0;b<month.days[0].wd;b++){ html+='<div></div>'; }
    month.days.forEach(function(d){
      const mark=d.completed?"✓":d.missed?"•":"";
      html+='<div class="cal-cell '+(d.isToday?'today':'')+' '+(d.completed?'done':'')+' '+(d.missed?'missedcell':'')+'" title="'+toFa(d.jd)+' '+MONTHS[d.jm-1]+'">'+
        '<span class="cal-num mono" style="color:'+(d.isToday?'var(--brass)':'var(--text)')+';">'+toFa(d.jd)+'</span>'+
        '<span style="font-size:9px;color:var(--ink2);margin-top:2px;">'+mark+'</span>'+
      '</div>';
    });
    html+='</div>';
  });
  html+='<div class="legend"><span>✓ فعالیت ثبت‌شده</span><span>• از دست رفته</span><span style="color:var(--brass);">حلقه طلایی = امروز</span></div>';
  return html;
}

function renderStats(){
  const sorted=state.bodyStats.slice().sort(function(a,b){return a.ts-b.ts;});
  let html='<div class="panel" style="padding:16px;">'+
    '<div style="font-weight:700;font-size:14px;margin-bottom:10px;">ثبت اندازه‌گیری امروز</div>'+
    '<div class="field-grid">'+
      '<input id="statWeight" class="stat-input-full full" type="number" inputmode="decimal" placeholder="وزن (کیلوگرم)" />'+
      '<input id="statWaist" class="stat-input-full" type="number" inputmode="decimal" placeholder="دور شکم (سانت)" />'+
      '<input id="statArm" class="stat-input-full" type="number" inputmode="decimal" placeholder="بازو (سانت)" />'+
      '<input id="statChest" class="stat-input-full" type="number" inputmode="decimal" placeholder="سینه (سانت)" />'+
      '<input id="statThigh" class="stat-input-full" type="number" inputmode="decimal" placeholder="ران (سانت)" />'+
    '</div>'+
    '<button class="btn-full" data-action="add-stat">+ ثبت اندازه‌گیری</button>'+
  '</div>';

  if(sorted.length>=2){
    const ws=sorted.map(function(s){return Number(s.weight)||0;});
    const as=sorted.map(function(s){return Number(s.waist)||0;});
    const minW=Math.min.apply(null,ws),maxW=Math.max.apply(null,ws),minA=Math.min.apply(null,as),maxA=Math.max.apply(null,as);
    const n=sorted.length;
    function pxv(i){ return (i/(n-1))*280+10; }
    function pyW(v){ return 90-((v-minW)/((maxW-minW)||1))*70; }
    function pyA(v){ return 90-((v-minA)/((maxA-minA)||1))*70; }
    const lineW=ws.map(function(v,i){return pxv(i)+","+pyW(v);}).join(" ");
    const lineA=as.map(function(v,i){return pxv(i)+","+pyA(v);}).join(" ");
    const first=sorted[0], last=sorted[n-1];
    const dW=(Number(last.weight)-Number(first.weight)).toFixed(1);
    const dA=(Number(last.waist)-Number(first.waist)).toFixed(1);
    html+='<div class="panel section-gap" style="padding:16px;">'+
      '<div class="row" style="justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:8px;">'+
        '<span>روند وزن و دور شکم</span><span class="mono">Δ وزن '+toFa(dW)+' · Δ شکم '+toFa(dA)+'</span>'+
      '</div>'+
      '<svg viewBox="0 0 300 100" style="width:100%;height:140px;">'+
        '<polyline points="'+lineW+'" fill="none" stroke="#3DDC74" stroke-width="2"/>'+
        '<polyline points="'+lineA+'" fill="none" stroke="#FF5252" stroke-width="2"/>'+
      '</svg>'+
      '<div class="legend"><span style="color:var(--green2);">— وزن</span><span style="color:var(--ink2);">— دور شکم</span></div>'+
    '</div>';
  }

  html+='<div class="panel section-gap" style="padding:16px;">'+
    '<div style="font-weight:700;font-size:14px;margin-bottom:8px;">تاریخچه</div>';
  if(sorted.length===0){
    html+='<div style="font-size:12px;color:var(--muted);">هنوز اندازه‌گیری ثبت نکردی.</div>';
  } else {
    html+='<div class="scroll">';
    sorted.slice().reverse().forEach(function(s){
      let extra="";
      if(s.arm||s.chest||s.thigh){
        extra='<div style="font-size:10px;color:var(--muted);margin-top:1px;">'+
          (s.arm?'بازو '+toFa(s.arm)+' ':'')+(s.chest?'· سینه '+toFa(s.chest)+' ':'')+(s.thigh?'· ران '+toFa(s.thigh):'')+
        '</div>';
      }
      html+='<div class="hist-row" style="flex-direction:column;align-items:stretch;"><div style="display:flex;justify-content:space-between;"><span style="color:var(--muted);">'+s.label+'</span><span class="mono">'+(s.weight?toFa(s.weight)+" کیلو":"—")+' · '+(s.waist?toFa(s.waist)+" سانت":"—")+'</span></div>'+extra+'</div>';
    });
    html+='</div>';
  }
  html+='</div>';

  if(state.photoGallery && state.photoGallery.length){
    html+='<div class="panel section-gap" style="padding:16px;">'+
      '<div style="font-weight:700;font-size:14px;margin-bottom:8px;">📷 عکس‌های پیشرفت</div><div class="row" style="flex-wrap:wrap;gap:8px;">';
    state.photoGallery.slice().reverse().forEach(function(p){
      html+='<img src="'+p.src+'" style="width:90px;height:90px;object-fit:cover;border-radius:8px;border:1px solid var(--border);" />';
    });
    html+='</div></div>';
  }
  return html;
}

/* ================= مربی هوشمند ================= */
function getProgressSummary(){
  const [sy,sm,sd]=startKey.split("-").map(Number);
  const sg=jalaliToGreg(sy,sm,sd);
  const startDate=new Date(sg[0],sg[1]-1,sg[2]);
  const daysPassed=Math.max(1,Math.floor((today-startDate)/86400000)+1);
  let workoutDaysPassed=0, completedWorkouts=0;
  for(let i=0;i<daysPassed;i++){
    const d=new Date(startDate); d.setDate(startDate.getDate()+i);
    const j=jalOf(d); const key=j[0]+"-"+j[1]+"-"+j[2];
    const rec=Object.values((state.progress[key]&&state.progress[key].exercises)||{});
    const doneCnt=rec.filter(function(s){return s.done;}).length;
    const homeDid=!!state.homeUsedDates[key];
    if(doneCnt>0||homeDid){ completedWorkouts+=1; }
    workoutDaysPassed+=1;
  }
  const rate=workoutDaysPassed>0?Math.round((completedWorkouts/workoutDaysPassed)*100):0;
  return {daysPassed:daysPassed, workoutDaysPassed:workoutDaysPassed, completedWorkouts:completedWorkouts, rate:rate};
}

/* ================= گیمیفیکیشن: استریک و مدال‌ها (کاملاً محلی) ================= */
function dayHasActivity(key){
  const rec=Object.values((state.progress[key]&&state.progress[key].exercises)||{});
  const doneCnt=rec.filter(function(s){return s.done;}).length;
  return doneCnt>0 || !!state.homeUsedDates[key];
}
function computeStreak(){
  let streak=0;
  for(let i=0;i<3650;i++){
    const d=new Date(today); d.setDate(today.getDate()-i);
    const j=jalOf(d); const key=j[0]+"-"+j[1]+"-"+j[2];
    if(dayHasActivity(key)){ streak+=1; }
    else if(i===0){ continue; } // امروز هنوز تموم نشده، رد کن ولی استریک رو نشکون
    else { break; }
  }
  return streak;
}
function computeTotalActiveDays(){
  const mainDates=Object.keys(state.progress).filter(function(k){return dayHasActivity(k);});
  const homeDates=Object.keys(state.homeUsedDates||{});
  const merged={};
  mainDates.forEach(function(k){merged[k]=true;});
  homeDates.forEach(function(k){merged[k]=true;});
  return Object.keys(merged).length;
}
function computeBadges(){
  const streak=computeStreak();
  const totalDays=computeTotalActiveDays();
  const prCount=Object.keys(state.prs||{}).length;
  const statCount=(state.bodyStats||[]).length;
  return [
    {emoji:"🔥",title:"شروع قدرتمند",desc:"اولین روز فعالیتت رو ثبت کردی",earned:totalDays>=1},
    {emoji:"🗓️",title:"یک هفته پیوسته",desc:"۷ روز متوالی فعالیت",earned:streak>=7},
    {emoji:"🏆",title:"اولین رکورد",desc:"یه وزنه رو به‌عنوان رکورد ثبت کردی",earned:prCount>=1},
    {emoji:"📏",title:"پیگیر پیشرفت",desc:"۳ بار اندازه‌گیری بدن ثبت کردی",earned:statCount>=3},
    {emoji:"💪",title:"ماراتن‌کار",desc:"۳۰ روز فعالیت (نه لزوماً پشت‌سرهم)",earned:totalDays>=30},
    {emoji:"⚡",title:"استریک ۳۰ روزه",desc:"۳۰ روز متوالی بدون وقفه",earned:streak>=30},
  ];
}

// ردیابی رفتار کاربر (ساعات تمرین، الگوها) — ذخیره‌ی محلی
function trackBehavior(event){
  const bh=loadJSON("ip_behavior",{workoutTimes:[],weekdays:[],lastWorkout:null,totalSessions:0});
  const now=new Date();
  const hour=now.getHours();
  const wd=wdIndex(now);
  // ثبت ساعت تمرین (برای تشخیص الگوی زمانی)
  if(event==="workout_complete"){
    bh.workoutTimes.push(hour);
    if(bh.workoutTimes.length>30) bh.workoutTimes=bh.workoutTimes.slice(-30);
    bh.totalSessions=(bh.totalSessions||0)+1;
    bh.lastWorkout=todayKey;
    // شمارش روزهای هفته
    bh.weekdays=bh.weekdays||[0,0,0,0,0,0,0];
    bh.weekdays[wd]=(bh.weekdays[wd]||0)+1;
  }
  saveJSON("ip_behavior",bh);
  return bh;
}
// تشخیص بهترین ساعت تمرین (پرتکرارترین)
function detectBestWorkoutHour(){
  const bh=loadJSON("ip_behavior",{workoutTimes:[]});
  const times=bh.workoutTimes||[];
  if(times.length<3) return null;
  // دسته‌بندی: صبح (6-11)، ظهر (12-16)، عصر (17-21)، شب (22-5)
  const slots={morning:0,noon:0,evening:0,night:0};
  times.forEach(function(h){
    if(h>=6&&h<=11) slots.morning++;
    else if(h>=12&&h<=16) slots.noon++;
    else if(h>=17&&h<=21) slots.evening++;
    else slots.night++;
  });
  let best="morning",bestVal=slots.morning;
  Object.keys(slots).forEach(function(k){ if(slots[k]>bestVal){best=k;bestVal=slots[k];} });
  const labels={morning:"صبح (۶ تا ۱۱)",noon:"ظهر (۱۲ تا ۱۶)",evening:"عصر (۱۷ تا ۲۱)",night:"شب (۲۲ تا ۵)"};
  return {slot:best,label:labels[best],count:bestVal,total:times.length};
}
// محاسبه‌ی ۴ امتیاز ASCUS
function computeScores(){
  const prog=getProgressSummary();
  const streak=computeStreak();
  const totalDays=computeTotalActiveDays();
  const prCount=Object.keys(state.prs||{}).length;
  const bs=(state.bodyStats||[]).length;
  const bh=loadJSON("ip_behavior",{totalSessions:0});
  // ۱) Discipline Score (انضباط): بر اساس نرخ تکمیل، استریک، نظم
  let discipline=Math.round(prog.rate*0.5 + Math.min(streak*3,30) + Math.min(totalDays,20));
  discipline=Math.min(100,discipline);
  // ۲) Nutrition Score (تغذیه): بر اساس ثبت کالری و پروتئین
  const todayItems=getCalorieLogDay(todayKey);
  const todayCal=calorieTotals(todayItems);
  const target=calcDailyTarget();
  let nutrition=0;
  if(todayItems.length>0) nutrition+=30; // ثبت کرده
  if(target){
    if(todayCal.kcal>0){
      const ratio=Math.min(todayCal.kcal/target.kcal,1.2);
      nutrition+=Math.round(ratio*35); // نزدیک به هدف
    }
    if(todayCal.p>0 && target.protein>0){
      const pratio=Math.min(todayCal.p/target.protein,1);
      nutrition+=Math.round(pratio*35); // پروتئین
    }
  }
  nutrition=Math.min(100,nutrition);
  // ۳) Workout Score (تمرین): بر اساس رکوردها، جلسات، تکمیل
  let workout=Math.min(100, Math.round(Math.min((bh.totalSessions||0)*4,40) + Math.min(prCount*8,40) + Math.min(prog.rate*0.2,20)));
  // ۴) Recovery Score (ریکاوری): بر اساس تعادل فعالیت/استراحت
  // بررسی اینکه آیا روزهای استراحت رعایت شدن
  let restBalance=50;
  if(prog.daysPassed>=7){
    // در ۷ روز اخیر چند روز فعالیت و چند روز استراحت داشته
    let activeRecent=0;
    for(let i=0;i<7;i++){
      const d=new Date(today); d.setDate(today.getDate()-i);
      if(dayHasActivity(keyOf(d))) activeRecent++;
    }
    // ایده‌آل: ۳ تا ۵ روز فعالیت در هفته
    if(activeRecent>=3 && activeRecent<=5) restBalance=100;
    else if(activeRecent>=2 && activeRecent<=6) restBalance=75;
    else if(activeRecent===0) restBalance=20;
    else restBalance=50; // بیش از حد یا خیلی کم
  }
  let recovery=Math.round(restBalance*0.7 + Math.min(bs*5,30));
  recovery=Math.min(100,recovery);
  return {
    discipline:discipline,
    nutrition:nutrition,
    workout:workout,
    recovery:recovery,
    overall:Math.round((discipline+nutrition+workout+recovery)/4)
  };
}
// تحلیل پیشرفت و تولید پیشنهادهای هوشمند (تشخیص پلاتو، پیشنهاد تغییر)
function analyzeProgress(){
  const scores=computeScores();
  const prog=getProgressSummary();
  const suggestions=[];
  // ۱) تشخیص پلاتو در وزن
  const bs=(state.bodyStats||[]).slice().sort(function(a,b){return a.ts-b.ts;});
  if(bs.length>=3){
    const last3=bs.slice(-3);
    const weights=last3.map(function(s){return Number(s.weight)||0;});
    const maxDiff=Math.max.apply(null,weights)-Math.min.apply(null,weights);
    if(maxDiff<0.5 && prog.daysPassed>=14){
      suggestions.push({type:"plateau",icon:"⚠️",title:"وزنت ثابت مونده",text:"در "+toFa(last3.length)+" اندازه‌گیری اخیر، وزنت تقریباً تغییر نکرده. اگه هدف"+(state.profile.goal==="bulk"?"ت افزایش حجمه":"ت چربی‌سوزیه")+"، وقتشه کالری یا شدت تمرین رو کمی تغییر بدی.",action:"adjust"});
    }
  }
  // ۲) امتیاز انضباط پایین
  if(scores.discipline<50 && prog.daysPassed>=7){
    suggestions.push({type:"discipline",icon:"📊",title:"انضباطت نیاز به بهبود داره",text:"نرخ حضورت "+toFa(prog.rate)+"٪ هست. برای نتیجه‌ی بهتر، سعی کن حداقل "+toFa(Math.ceil((state.profile.daysPerWeek||4)*0.8))+" روز در هفته تمرین کنی.",action:"none"});
  }
  // ۳) پروتئین کم
  const todayItems=getCalorieLogDay(todayKey);
  if(todayItems.length>0){
    const todayCal=calorieTotals(todayItems);
    const target=calcDailyTarget();
    if(target && todayCal.p>0 && todayCal.p<target.protein*0.7){
      suggestions.push({type:"protein",icon:"🥩",title:"پروتئین امروزت کمه",text:"تا الان "+toFa(Math.round(todayCal.p))+" گرم پروتئین ثبت کردی ولی هدف "+toFa(target.protein)+" گرمه. یه وعده‌ی پروتئینی (مثل تخم‌مرغ، سینه مرغ یا سویا) اضافه کن.",action:"none"});
    }
  }
  // ۴) پیشنهاد افزایش شدت (اگه همه‌چیز خوب پیش رفته)
  if(scores.overall>=75 && prog.daysPassed>=21){
    const recentPrs=Object.keys(state.prs||{}).length;
    if(recentPrs>=3){
      suggestions.push({type:"levelup",icon:"🚀",title:"آماده‌ی سطح بالاتری!",text:"پیشرفتت عالیه و به رکوردهای جدید رسیدی. می‌تونیم شدت تمرین رو بیشتر کنیم یا حرکات سنگین‌تر اضافه کنیم. از چت بپرس «یه برنامه‌ی سخت‌تر بساز».",action:"regenerate"});
    }
  }
  // ۵) تشخیص بهترین ساعت تمرین
  const bestHour=detectBestWorkoutHour();
  if(bestHour && bestHour.total>=3){
    suggestions.push({type:"timing",icon:"⏰",title:"الگوی تمرینت رو پیدا کردم",text:"معمولاً "+bestHour.label+" تمرین می‌کنی ("+toFa(bestHour.count)+" از "+toFa(bestHour.total)+" جلسه). این بهترین زمان برای یادآوری تمرینه.",action:"none"});
  }
  // ۶) یادآوری استراحت (اگه زیادی تمرین کرده)
  if(prog.daysPassed>=7){
    let activeRecent=0;
    for(let i=0;i<7;i++){
      const d=new Date(today); d.setDate(today.getDate()-i);
      if(dayHasActivity(keyOf(d))) activeRecent++;
    }
    if(activeRecent>=6 && (state.profile.daysPerWeek||4)<6){
      suggestions.push({type:"overtraining",icon:"😴",title:"بدنت نیاز به استراحت داره",text:toFa(activeRecent)+" روز از ۷ روز اخیر تمرین کردی. یادت نره ریکاوری هم بخش مهمیه. یه روز استراحت کامل یا هوازی سبک بکن.",action:"none"});
    }
  }
  return {scores:scores,suggestions:suggestions};
}

// مترادف‌های گروه‌های عضلانی برای درک درخواست کاربر
const GROUP_SYNONYMS={

  "زیربغل":["زیربغل","بک","back","لت","بارفیکس","تی‌بار","تی بار","قایقی","زیر بغل"],
  "پا":["پا","پاها","leg","اسکوات","ددلیفت","لانگ","ساق","ران","پشت پا","زیربغل پا"],
  "سرشانه":["سرشانه","شانه","shoulder","دلتوئید","نشر","کول","سر شانه"],
  "جلو بازو":["جلو بازو","جلوبرو","bicep","بایسپس","جلو برو","جلوبروزو"],
  "پشت بازو":["پشت بازو","پشتبرو","tricep","ترایسپس","پشت برو"],

};
function dayEmojiFor(g){

function isProgramRequest(t){

}
// تولید برنامه‌ی شخصی بر اساس درخواست + مشخصات کاربر (کاملاً محلی و قابل‌اعتماد)
function generateAiProgram(text){
  const p=state.profile;
  const goal=p.goal, level=p.level;
  let daysCount=p.daysPerWeek||4;
  // تشخیص تعداد روزهای خواسته‌شده
  const dm=text.match(/(\d)\s*روز/);
  if(dm){ const dn=Number(dm[1]); if(dn>=3&&dn<=6) daysCount=dn; }
  // تشخیص گروه‌های عضلانی خواسته‌شده
  let groups=[];
  Object.keys(GROUP_SYNONYMS).forEach(function(g){
    if(GROUP_SYNONYMS[g].some(function(syn){ return text.indexOf(syn)!==-1; })) groups.push(g);
  });
  // اگه چیزی نگفته بود، یه ترکیب متوازنِ متناسب با تعداد روز
  if(groups.length===0){
    const pool=["سینه","زیربغل","پا","سرشانه","جلو بازو","پشت بازو"];
    groups=pool.slice(0, Math.max(2, Math.min(pool.length, Math.ceil(daysCount*1.2))));
  }
  const cardioRequested=/هوازی|کاردیو|چربی|چربی‌سوز|لی/.test(text) || goal==="fatloss";
  const cardioKey=p.gender==="female"?"هوازی_زن":"هوازی_مرد";
  const n=countForLevel(level);
  // ساخت روزهای تمرین
  const workouts=[];
  for(let d=0; d<daysCount; d++){
    const focus=[groups[d%groups.length]];
    const second=groups[(d*2+1)%groups.length];
    if(second!==focus[0]) focus.push(second);
    let exs=[];
    focus.forEach(function(g){
      const pool=LIB_GYM[g]||[];
      pickN(pool,n).forEach(function(pp){
        exs.push({id:uid("ex"),refId:pp.id,group:g,name:pp.name,video:pp.video,archetype:pp.archetype,presc:prescFor(goal,level,pp.compound)});
      });
    });
    // فینیشر شکم
    pickN(LIB_GYM["شکم"]||[],2).forEach(function(pp){
      exs.push({id:uid("ex"),refId:pp.id,group:"شکم",name:pp.name,video:pp.video,archetype:pp.archetype,presc:prescFor(goal,level,false),isFinisher:true});
    });
    // هوازی اگه خواسته شده یا روز آخر
    if(cardioRequested && (d===daysCount-1 || d%2===1)){
      pickN(LIB_GYM[cardioKey]||[],1).forEach(function(pp){
        exs.push({id:uid("ex"),refId:pp.id,group:"هوازی",name:pp.name,video:pp.video,archetype:pp.archetype,presc:goal==="fatloss"?"۳۰-۴۵ دقیقه":"۲۰-۳۰ دقیقه"});
      });
    }
    workouts.push({type:"workout",title:focus.join(" + "),eyebrow:"AI PROGRAM",emoji:dayEmojiFor(focus[0]),heroGrad:heroGradFor(d),exercises:exs});
  }
  // توزیع در ۷ روز با روزهای استراحت
  const seven=[];
  const step=7/daysCount;
  const positions=[];
  for(let d=0; d<daysCount; d++){ positions.push(Math.round(d*step)); }
  let wi=0;
  for(let i=0;i<7;i++){
    if(wi<workouts.length && i===positions[wi]){ seven.push(workouts[wi]); wi++; }
    else { seven.push({type:"rest",title:"استراحت / ریکاوری",eyebrow:"REST DAY",emoji:"🌙",heroGrad:heroGradFor(i),exercises:[]}); }
  }
  return seven;
}

function answerQuestion(q){
  const t=(q||"").trim();
  const p=state.profile;
  // ۱) هدف و نتایج
  if(/هدف|نزدیک|چقدر مونده|نتیجه|به کجا/.test(t)){
    let r='🎯 هدف فعلی تو: '+GOAL_LABEL[p.goal]+' (سطح '+LEVEL_LABEL[p.level]+')\n\nنتایجی که می‌تونی انتظار داشته باشی:\n';
    (RESULTS_BY_GOAL[p.goal]||[]).forEach(function(x,i){ r+=toFa(i+1)+'. '+x+'\n'; });
    r+='\n'+(GOAL_NUTRI_TIP[p.goal]||"");
    return r;
  }
  // امتیازات و اسکور
  if(/امتیاز|اسکور|نمره|چقدر خوب|عملکردم|کیفیت/.test(t)){
    const sc=computeScores();
    let r='📊 امتیازات تناسب اندامت:\n\n';
    r+='🎯 انضباط: '+toFa(sc.discipline)+'٪\n';
    r+='🍽️ تغذیه: '+toFa(sc.nutrition)+'٪\n';
    r+='💪 تمرین: '+toFa(sc.workout)+'٪\n';
    r+='😴 ریکاوری: '+toFa(sc.recovery)+'٪\n\n';
    r+='⭐ امتیاز کلی: '+toFa(sc.overall)+'٪\n\n';
    const weakest=sc.discipline<=sc.nutrition&&sc.discipline<=sc.workout&&sc.discipline<=sc.recovery?"انضباط":sc.nutrition<=sc.workout&&sc.nutrition<=sc.recovery?"تغذیه":sc.workout<=sc.recovery?"تمرین":"ریکاوری";
    r+='💡 ضعیف‌ترین بخشت: '+weakest+'. روی اون تمرکز کن تا امتیاز کلیت بره بالا.';
    return r;
  }
  // پیشنهاد و تحلیل هوشمند
  if(/پیشنهاد|تحلیل|چیکار کنم|بهبود|توصیه|مشکل کجاست|چیکار باید/.test(t)){
    const analysis=analyzeProgress();
    if(analysis.suggestions.length===0) return '🎉 الان همه‌چیز عالیه! پیشنهاد خاصی ندارم. همین روند رو ادامه بده 💪';
    let r='💡 بر اساس تحلیل داده‌هات، این پیشنهادها رو دارم:\n\n';
    analysis.suggestions.forEach(function(s,i){ r+=toFa(i+1)+'. '+s.title+':\n   '+s.text+'\n\n'; });
    return r;
  }
  // بهترین زمان تمرین
  if(/چه ساعت|کِی برم|بهترین زمان|کِی تمرین|چه وقت/.test(t)){
    const best=detectBestWorkoutHour();
    if(!best) return '⏰ هنوز الگوی تمرینت رو تشخیص ندادم. بعد از ۳ جلسه تمرین، می‌تونم بهترین ساعتت رو بهت بگم.';
    return '⏰ بر اساس رفتارت، معمولاً '+best.label+' تمرین می‌کنی ('+toFa(best.count)+' از '+toFa(best.total)+' جلسه). این بهترین زمان برای یادآوری و تمرینه. سعی کن منظم همون ساعت باشی.';
  }
  // ۲) پیشرفت و استریک
  if(/پیشرفت|چطور پیش|استریک|استریکم|چقدر رفتم|پیگیری/.test(t)){
    const ps=getProgressSummary();
    const st=computeStreak();
    let r='📊 روز '+toFa(ps.daysPassed)+' از شروع برنامه هستی.\n';
    r+='از '+toFa(ps.workoutDaysPassed)+' روز گذشته، '+toFa(ps.completedWorkouts)+' روزش فعالیت ثبت کردی ('+toFa(ps.rate)+'٪).\n';
    r+='🔥 استریک فعلی: '+toFa(st)+' روز.\n\n';
    r+=(ps.rate>=80?'عالیه! همین نظم رو نگه دار، داری عالی پیش می‌ری 🔥':ps.rate>=50?'خوبه ولی می‌تونی منظم‌تر باشی. یه روز هم جا ننداز 💪':'بیا فشار رو ببر بالا، عقب نمون! همین امروز شروع کن ⚠️');
    return r;
  }
  // ۳) برنامه امروز
  if(/امروز/.test(t) && /(برنامه|تمرین|چی|چیه|بزنم)/.test(t)){
    const idx=activeIndexOf("main"); const day=state.mainProgram[idx];
    if(!day||day.type!=="workout") return '🌙 امروز روز استراحته. یه هوازی سبک یا کشش کافیه. فردا برمی‌گردی سر تمرین 💪';
    let r='📅 برنامه‌ی امروز: '+day.title+'\n\n';
    day.exercises.forEach(function(ex,i){ r+=toFa(i+1)+'. '+ex.name+' — '+ex.presc+' ('+ex.group+')\n'; });
    return r;
  }
  // ۴) برنامه کل هفته
  if(/هفته|همه.*روز|کلا.*برنامه/.test(t)){
    let r='🗓 برنامه‌ی کل هفته‌ت:\n\n';
    state.mainProgram.forEach(function(day,i){
      if(day.type==="rest"){ r+='روز '+toFa(i+1)+': 🌙 استراحت\n'; }
      else { r+='روز '+toFa(i+1)+': '+day.emoji+' '+day.title+' ('+toFa(day.exercises.length)+' حرکت)\n'; }
    });
    return r;
  }
  // ۵) تغذیه و رژیم
  if(/تغذیه|غذا|بخورم|رژیم|وعده|غذایی|خوراکی/.test(t)){
    let r='🍽 برنامه‌ی غذایی فعلی تو:\n\n';
    if(!state.nutrition||!state.nutrition.length) return 'هنوز برنامه غذایی تنظیم نشده. از تب «تغذیه» می‌تونی ببینی/ویرایش کنی.';
    state.nutrition.forEach(function(m){
      r+='▸ '+m.title+':\n';
      m.items.forEach(function(it){ r+='   • '+it.text+'\n'; });
    });
    r+='\n💡 '+GOAL_NUTRI_TIP[p.goal];
    return r;
  }
  // ۶) کالری غذا
  if(/کالری/.test(t)){
    const keys=Object.keys(FOOD_CALORIES);
    const found=keys.find(function(k){ return t.indexOf(k)!==-1; });
    if(found) return '🔍 '+FOOD_CALORIES[found];
    let r='🔥 کالری چند غذای رایج:\n\n';
    ["تخم مرغ","نان سنگک","شیر","موز","جو دوسر","سویا","برنج","عدس","ماست","سبزیجات"].forEach(function(k){ r+='• '+FOOD_CALORIES[k]+'\n'; });
    return r;
  }
  // ۷) قوانین طلایی
  if(/قانون|طلایی|نکته.*مهم|اصول/.test(t)){
    let r='🏆 قوانین طلایی موفقیت:\n\n';
    RULES.forEach(function(x,i){ r+=toFa(i+1)+'. '+x+'\n'; });
    return r;
  }
  // ۸) رکوردها
  if(/رکورد|PR|بهترین وزنه|چند کیلو/.test(t)){
    let prList=[];
    [["main",state.mainProgram],["quick",state.quickProgram],["home",state.homeProgram]].forEach(function(pp){
      pp[1].forEach(function(day){ (day.exercises||[]).forEach(function(ex){
        const key=pp[0]+"_"+ex.id;
        if(state.prs[key] && !prList.find(function(z){return z.key===key;})){ prList.push({key:key,name:ex.name,weight:state.prs[key]}); }
      });});
    });
    if(!prList.length) return '🏆 هنوز رکوردی ثبت نکردی. وزنه‌ای که می‌زنی رو کنار هر حرکت بنویس تا بهترینت ذخیره بشه.';
    prList.sort(function(a,b){return b.weight-a.weight;});
    let r='🏆 رکوردهای ثبت‌شده‌ت:\n\n';
    prList.forEach(function(z,i){ r+=(i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':'• ')+z.name+': '+toFa(z.weight)+' کیلو\n'; });
    return r;
  }
  // ۹) آمار بدن
  if(/وزنم|دور شکم|آمار|بدنم|قد|سنم/.test(t)){
    const bs=(state.bodyStats||[]).slice().sort(function(a,b){return a.ts-b.ts;});
    if(!bs.length) return '📏 هنوز اندازه‌گیری ثبت نکردی. از تب «آماره» وزن و دور بدنت رو ثبت کن تا روندت رو ببینم.';
    const last=bs[bs.length-1];
    let r='📏 آخرین اندازه‌گیری ('+last.label+'):\n';
    if(last.weight) r+='وزن: '+toFa(last.weight)+' کیلو\n';
    if(last.waist) r+='دور شکم: '+toFa(last.waist)+' سانت\n';
    if(bs.length>=2){ const f=bs[0]; r+='\nاز شروع: وزن '+(Number(last.weight)-Number(f.weight)>=0?'+':'')+toFa((Number(last.weight)-Number(f.weight)).toFixed(1))+' کیلو'; }
    return r;
  }
  // ۱۰) شناخت یه حرکت خاص
  const allProgs=[["main",state.mainProgram],["quick",state.quickProgram],["home",state.homeProgram]];
  for(let pi=0;pi<allProgs.length;pi++){
    const arr=allProgs[pi][1];
    for(let wd=0; wd<arr.length; wd++){
      if(!arr[wd].exercises) continue;
      for(let i=0;i<arr[wd].exercises.length;i++){
        const ex=arr[wd].exercises[i];
        if(t.indexOf(ex.name)!==-1){
          let r='💪 '+ex.name+'\nگروه عضلانی: '+ex.group+' · تجویز: '+ex.presc+'\n\n';
          const mKey=GROUP_TO_MISTAKE[ex.group];
          if(mKey){ const mm=MISTAKES.find(function(x){return x.title===mKey;}); if(mm){ r+='⚠️ نکات فرم صحیح:\n'; mm.tips.forEach(function(tip){ r+='• '+tip+'\n'; }); } }
          r+='\nبرای دیدن ویدیو، روی دکمه‌ی ▶ یا 🔍 کنار همون حرکت بزن.';
          return r;
        }
      }
    }
  }
  // ۱۱) اشتباهات رایج یه گروه عضلانی
  for(let mi=0; mi<MISTAKES.length; mi++){
    if(t.indexOf(MISTAKES[mi].title)!==-1){
      let r='⚠️ اشتباهات رایج '+MISTAKES[mi].title+' '+MISTAKES[mi].emoji+':\n\n';
      MISTAKES[mi].tips.forEach(function(x,i){ r+=toFa(i+1)+'. '+x+'\n'; });
      return r;
    }
  }
  // ۱۲) راهنمای کلی
  return applyPersonalityTone('💪 من مربی هوشمند آیرونم و به همه‌ی داده‌هات دسترسی دارم. می‌تونی این‌ها رو ازم بپرسی:\n\n• «برنامه‌ی امروزم چیه؟」\n• «امتیازام چطورن؟」 🆕\n• «پیشنهادی برام داری？」 🆕\n• «بهترین ساعت تمرینم کِیه？」 🆕\n• «پیشرفتم چطوره？」\n• «تغذیه‌م چیه？」\n• «رکوردهام چی هستن？」\n• «یه برنامه سینه و پا برام بساز」\n\nیا اسم هر حرکت رو بپرس تا نکات فرمش رو بگم.');
}

// تولید برنامه غذایی محلی (fallback هوشمند)
function generateLocalNutrition(req, goal){
  const wantBudget=/ارزون|اقتصاد|ارزان|بودجه|فقر/.test(req);
  const wantProtein=/پروتئین|پروتئینی|حجم|عضله/.test(req);
  const wantCut=/کات|چربی|خشک|رژیم/.test(req);
  let meals=[];
  if(wantBudget){
    meals=[
      {title:"صبحانه",items:["2 عدد تخم مرغ + نان سنگک","چای بدون قند"]},
      {title:"ناهار",items:["عدس پخته + برنج","سبزیجات فصل"]},
      {title:"میان وعده",items:["موز","نان + پنیر"]},
      {title:"شام",items:["ماست + نان","سالاد"]},
    ];
  } else if(wantProtein || goal==="bulk"){
    meals=[
      {title:"صبحانه",items:["4 عدد تخم مرغ کامل","جو دوسر + شیر","موز"]},
      {title:"ناهار",items:["سینه مرغ 200 گرم","برنج + عدس","سبزیجات"]},
      {title:"بعد از تمرین",items:["شیر + موز","کره بادام زمینی"]},
      {title:"شام",items:["ماهی یا گوشت","سالاد","نان سنگک"]},
    ];
  } else if(wantCut || goal==="cut" || goal==="fatloss"){
    meals=[
      {title:"صبحانه",items:["3 سفیده + 1 زرده","نان سنگک"]},
      {title:"ناهار",items:["سینه مرغ گریل","سالاد سبزیجات"]},
      {title:"میان وعده",items:["سیب یا کیوی"]},
      {title:"شام",items:["تخم مرغ آب پز","سبزیجات بخارپز"]},
    ];
  } else {
    meals=[
      {title:"صبحانه",items:["3 عدد تخم مرغ","نان سنگک","چای"]},
      {title:"ناهار",items:["مرغ یا گوشت","برنج","سالاد"]},
      {title:"میان وعده",items:["موز + آجیل"]},
      {title:"شام",items:["ماست یا تخم مرغ","سبزیجات"]},
    ];
  }
  let text=meals.map(function(m){return m.title+": "+m.items.join("، ");}).join("\n");
  return {text:text, meals:meals.map(function(m){return {id:uid("m"),title:m.title,items:m.items.map(function(i){return{id:uid("i"),text:i};})};})};
}
function applyAiNutritionResult(){
  if(!state.nutriAiResult) return;
  // اگه برنامه محلی موجوده، مستقیم اعمال کن
  if(state._pendingLocalNutri && state._pendingLocalNutri.length){
    if(!confirm("این "+toFa(state._pendingLocalNutri.length)+" وعده جایگزین برنامه غذایی فعلی بشه؟")) return;
    state.nutrition=state._pendingLocalNutri;
    saveJSON("ip_nutrition",state.nutrition);
    state.nutriAiResult=null;
    state._pendingLocalNutri=null;
    alert("برنامه غذایی جدید اعمال شد! ✅");
    render();
    return;
  }
  // پارس کردن متن AI به وعده‌های غذایی (انعطاف‌پذیر)
  const lines=state.nutriAiResult.split("\n").filter(function(l){return l.trim() && !l.startsWith("⚠️") && !l.startsWith("برنامه") && !l.startsWith("(");});
  const meals=[];
  lines.forEach(function(line){
    // پیدا کردن اولین ":" یا "-"
    let title="", itemsStr="";
    const colonIdx=line.indexOf(":");
    const dashIdx=line.indexOf("-");
    let sepIdx=colonIdx;
    if(colonIdx===-1 || (dashIdx!==-1 && dashIdx<colonIdx)) sepIdx=dashIdx;
    if(sepIdx>0){
      title=line.substring(0,sepIdx).trim().replace(/^[0-9]+\./,"").trim();
      itemsStr=line.substring(sepIdx+1).trim();
    }
    if(title && itemsStr){
      // پارس کردن آیتم‌ها با چند جداکننده
      const items=itemsStr.split(/[،,\-•|]/).map(function(s){return s.trim();}).filter(function(s){return s.length>1;});
      if(items.length){
        meals.push({id:uid("m"),title:title,items:items.map(function(t){return {id:uid("i"),text:t};})});
      }
    }
  });
  if(meals.length===0){
    alert("نتونستم برنامه رو پردازش کنم. لطفا دستی وارد کن یا از رژیم‌های آماده استفاده کن.");
    return;
  }
  if(!confirm("این "+toFa(meals.length)+" وعده جایگزین برنامه غذایی فعلی بشه؟")) return;
  state.nutrition=meals;
  saveJSON("ip_nutrition",state.nutrition);
  state.nutriAiResult=null;
  alert("برنامه غذایی جدید اعمال شد! ✅");
  render();
}

async function sendChat(){
  const inp=document.getElementById("chatInput");
  if(!inp) return;
  const text=inp.value.trim();
  const photo=state.chatPhoto;
  if(!text && !photo) return;
  inp.value="";
  const userDisplay = text || (photo ? "📷 عکس ارسال شد" : "");
  function addMsg(userText, assistantMsg){
    state.chat=state.chat.concat([{role:"user",text:userText, photo:photo}, assistantMsg]).slice(-30);
    saveJSON("ip_chat",state.chat);
    state.chatTyping=false;
    state.chatPhoto=null;
    render();
  }
  // ۱) درخواست ساخت برنامه (با یا بدون عکس) → محلی + قابل اعمال
  if(isProgramRequest(text)){
    const prog=generateAiProgram(text||"");
    prog.progId=uid("aiprog");
    state.pendingAiProgramId=prog.progId;
    state.pendingAiProgram=prog;
    addMsg(userDisplay, {role:"assistant", text:"یه برنامه‌ی شخصی‌سازی‌شده ساختم! سطح: "+LEVEL_LABEL[state.profile.level]+" · هدف: "+GOAL_LABEL[state.profile.goal]+". اگه خوشت اومد، می‌تونی با دکمه‌ها کامل جایگزین برنامه‌ی فعلی کنی یا فقط برای امروز اعمالش کنی 👇", program:prog});
    return;
  }
  // ۲) کاربر وارد شده → AI آنلاین (با عکس و زمینه)
  if(state.authUser){
    state.chatTyping=true;
    state.chat=state.chat.concat([{role:"user",text:userDisplay, photo:photo}]).slice(-30);
    saveJSON("ip_chat",state.chat);
    state.chatPhoto=null;
    render();
    try{
      const prompt = photo ? (text || "این عکس رو تحلیل کن و در مورد بدن/غذا راهنماییم کن.") : text;
      const res=await api.aiChat(prompt, buildAIContext(), photo||null);
      let reply=res&&(res.reply||res.text||res.message)||"";
      if(typeof reply!=="string") reply=JSON.stringify(reply);
      state.chatTyping=false;
      state.chat=state.chat.concat([{role:"assistant",text:reply}]).slice(-30);
      saveJSON("ip_chat",state.chat);
      render();
    }catch(e){
      state.chatTyping=false;
      let fb=answerQuestion(text);
      if(e.status===429){ fb="⚡ سقف پیام رایگان امروزت تموم شد.\n\nبرای گفتگوی نامحدود، از بخش «👑 اشتراک VIP» همین تب استفاده کن.\n\nدر عوض، این جواب از دانش داخلی اپ:\n\n"+answerQuestion(text); }
      else if(e.status===503||e.offline){ fb=answerQuestion(text)+"\n\n─\n(مربی آنلاین موقتاً در دسترس نیست؛ این جواب از دانش داخلی اپ‌ست)"; }
      state.chat=state.chat.concat([{role:"assistant",text:fb}]).slice(-30);
      saveJSON("ip_chat",state.chat);
      render();
    }
    return;
  }
  // ۳) مهمان → fallback محلی
  const usage=loadJSON("ip_guest_ai_usage",{date:todayKey,count:0});
  if(usage.date!==todayKey){ usage.date=todayKey; usage.count=0; }
  if(usage.count>=5){ addMsg(userDisplay, {role:"assistant",text:"⚡ سقف ۵ پیام رایگان امروزت تموم شد.\n\nبرای گفتگوی هوشمند نامحدود و تحلیل عکس با Gemini، یه حساب بساز و VIP بگیر 👑\n\n(ساخت برنامه‌ی جدید همیشه رایگانه!)"}); return; }
  usage.count+=1;
  saveJSON("ip_guest_ai_usage",usage);
  let localReply=answerQuestion(text);
  if(photo && !state.authUser) localReply="📷 برای تحلیل عکس با هوش مصنوعی باید وارد حساب بشی. ولی ساخت برنامه همیشه رایگانه — «یه برنامه برام بساز» رو امتحان کن!\n\n"+answerQuestion(text);
  addMsg(userDisplay, {role:"assistant",text:localReply});
}

      '<input id="rmWeight" class="stat-input-full" type="number" inputmode="numeric" placeholder="وزنه (کیلو)" />'+
